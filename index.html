<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- Wichtig für echtes Vollbild auf iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wand-Timer</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #f3f5f8 0%, #dde3ea 55%, #cfd6df 100%);
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#topTime {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 44px;
  font-weight: 700;
  color: rgba(0,0,0,0.75);
  background: rgba(255,255,255,0.45);
  padding: 10px 16px;
  border-radius: 14px;
}

canvas {
  width: 85vmin;
  height: 85vmin;
}

#controls {
  position: absolute;
  bottom: 18px;
  right: 18px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: rgba(255,255,255,0.55);
  padding: 10px 12px;
  border-radius: 14px;
  opacity: 0.35;
  transition: opacity 0.2s;
}

#controls:hover { opacity: 0.95; }

#controls input, #controls button {
  font-size: 16px;
  padding: 6px 8px;
}
</style>
</head>
<body>

<div id="topTime">--:--</div>
<canvas id="timer"></canvas>

<div id="controls">
  <input type="number" id="minutesInput" value="45" min="1" max="60">
  <button id="btnSet">Setzen</button>
  <button id="btnToggle">Start / Pause</button>
</div>

<script>
const canvas = document.getElementById("timer");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 800;

let totalTime = 60 * 60;
let remaining = 45 * 60;
let running = false;

const MORNING_MINUTES = 45;
const AUTO_START_H = 7, AUTO_START_M = 15;
const AUTO_ZERO_H  = 8, AUTO_ZERO_M  = 0;

let lastAutoStartKey = null;
let lastAutoZeroKey = null;

let blinkUntil = 0; // echtes Blinken bis Timestamp

function todayKey(d) {
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function applyDailyAutomation(now = new Date()) {
  const key = todayKey(now);
  const h = now.getHours();
  const m = now.getMinutes();

  if (h === AUTO_START_H && m === AUTO_START_M && lastAutoStartKey !== key) {
    remaining = MORNING_MINUTES * 60;
    document.getElementById("minutesInput").value = MORNING_MINUTES;
    running = true;
    lastAutoStartKey = key;
  }

  if (h === AUTO_ZERO_H && m === AUTO_ZERO_M && lastAutoZeroKey !== key) {
    if (remaining === 0) {
      blinkUntil = Date.now() + 60000; // 1 Minute echtes Blinken
    }
    running = false;
    lastAutoZeroKey = key;
  }
}

function getColor(secondsLeft) {
  if (secondsLeft <= 15 * 60) return "#d64545";
  if (secondsLeft <= 30 * 60) return "#e6b800";
  return "#3cb371";
}

function drawClockFace() {
  ctx.beginPath();
  ctx.arc(400, 400, 360, 0, 2 * Math.PI);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.lineWidth = 8;
  ctx.strokeStyle = "#cccccc";
  ctx.stroke();
}

function drawTimerArc() {

  if (Date.now() < blinkUntil) {
    const phase = Math.floor(Date.now() / 500) % 2;
    if (phase === 1) return; // echtes An/Aus Blinken
  }

  const progress = remaining / totalTime;
  const angle = progress * 2 * Math.PI;

  ctx.beginPath();
  ctx.moveTo(400, 400);
  ctx.arc(400, 400, 335, -Math.PI/2, angle - Math.PI/2, false);
  ctx.fillStyle = getColor(remaining);
  ctx.fill();
}

function formatMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ":" + String(s).padStart(2,"0");
}

function drawRemaining() {
  ctx.fillStyle = "#000";
  ctx.font = "bold 86px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(formatMMSS(remaining), 400, 410);
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawClockFace();
  drawTimerArc();
  drawRemaining();
  requestAnimationFrame(draw);
}

function tick() {
  applyDailyAutomation(new Date());

  if (running && remaining > 0) {
    remaining--;
  }
}

function toggleTimer() { running = !running; }

function setTimer() {
  let minutes = Number(document.getElementById("minutesInput").value);
  minutes = Math.max(1, Math.min(60, minutes));
  remaining = minutes * 60;
}

document.getElementById("btnSet").addEventListener("click", setTimer);
document.getElementById("btnToggle").addEventListener("click", toggleTimer);

function updateTopTime() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,"0");
  const mm = String(now.getMinutes()).padStart(2,"0");
  document.getElementById("topTime").textContent = hh+":"+mm;
}

setInterval(tick,1000);
setInterval(updateTopTime,1000);

draw();
updateTopTime();
</script>

</body>
</html>
