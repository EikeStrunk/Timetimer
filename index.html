<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wand-Timer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #f3f5f8 0%, #dde3ea 55%, #cfd6df 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #topTime {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 44px;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 16px;
    border-radius: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  canvas {
    width: 85vmin;
    height: 85vmin;
    filter: drop-shadow(0 10px 35px rgba(0,0,0,0.18));
  }

  /* Dezente, immer sichtbare Bedienleiste (ohne Passwort) */
  #controls {
    position: absolute;
    bottom: 18px;
    right: 18px;
    display: flex;
    gap: 10px;
    align-items: center;

    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,0,0,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 10px 12px;
    border-radius: 14px;

    opacity: 0.45;
    transition: opacity 180ms ease, transform 180ms ease;
    user-select: none;
    touch-action: manipulation;
  }

  #controls:hover,
  #controls:focus-within {
    opacity: 0.95;
    transform: translateY(-2px);
  }

  #controls .label {
    font-size: 14px;
    color: rgba(0,0,0,0.65);
    margin-right: 2px;
  }

  #controls input, #controls button {
    font-size: 16px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.75);
    color: rgba(0,0,0,0.85);
    outline: none;
  }

  #controls button { cursor: pointer; }
  #controls button:active { transform: translateY(1px); }

  /* Vollbild-Video Overlay */
  #videoOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 9999;
  }

  #videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }

  .hidden {
    display: none !important;
  }
</style>
</head>

<body>
  <div id="topTime">--:--</div>
  <canvas id="timer"></canvas>

  <div id="controls" aria-label="Timer-Steuerung">
    <span class="label">Min:</span>
    <input type="number" id="minutesInput" value="45" min="1" max="60" />
    <button id="btnSet">Setzen</button>
    <button id="btnToggle">Start / Pause</button>
  </div>

  <!-- Video Overlay -->
  <div id="videoOverlay">
    <!-- Wie in der funktionierenden Version: autoplay + muted für iOS/Browser-Sicherheit -->
    <video id="starshipVideo" playsinline webkit-playsinline preload="auto" muted></video>
  </div>

<script>
  const canvas = document.getElementById("timer");
  const ctx = canvas.getContext("2d");

  canvas.width = 800;
  canvas.height = 800;

  let totalTime = 60 * 60;     // 60min Skala
  let remaining = 45 * 60;
  let running = false;

  // ---- Tages-Automatik (Version A) ----
  const AUTO_START_H = 7, AUTO_START_M = 15;
  const AUTO_ZERO_H  = 8, AUTO_ZERO_M  = 0;
  const MORNING_MINUTES = 45;

  let lastAutoStartKey = null;
  let lastAutoZeroKey = null;

  function todayKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const da = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${da}`;
  }

  // ---- Farben: >45 blau, >30 grün, >15 gelb, <=15 rot ----
  function getColor(secondsLeft) {
    if (secondsLeft > 45 * 60) return "#1a73e8";
    if (secondsLeft > 30 * 60) return "#3cb371";
    if (secondsLeft > 15 * 60) return "#e6b800";
    return "#d64545";
  }

  // ---- Video bei 10 Sekunden ----
  const videoOverlay = document.getElementById("videoOverlay");
  const starshipVideo = document.getElementById("starshipVideo");

  // ✅ Dateiname hier anpassen, falls nötig:
  const VIDEO_SRC = "starship3.mp4";

  let videoStarted = false;

  function hideTimerShowVideo() {
    if (videoStarted) return;
    videoStarted = true;

    // alles ausblenden
    document.getElementById("topTime").classList.add("hidden");
    document.getElementById("controls").classList.add("hidden");
    canvas.classList.add("hidden");

    // Video einblenden und starten
    videoOverlay.style.display = "block";
    starshipVideo.src = VIDEO_SRC;
    starshipVideo.currentTime = 0;

    // Autoplay versuchen (muted => klappt am zuverlässigsten)
    const p = starshipVideo.play();
    if (p && typeof p.catch === "function") {
      p.catch(() => {
        // Falls Autoplay blockiert wird, bleibt das erste Frame sichtbar.
        // (Kann bei Bedarf mit Startbutton ergänzt werden.)
      });
    }
  }

  // Nach Video-Ende: wieder anzeigen (Timer steht dann auf 0)
  starshipVideo.addEventListener("ended", () => {
    videoOverlay.style.display = "none";
    starshipVideo.pause();

    canvas.classList.remove("hidden");
    document.getElementById("topTime").classList.remove("hidden");
    document.getElementById("controls").classList.remove("hidden");
  });

  function resetVideoState() {
    videoStarted = false;
    videoOverlay.style.display = "none";
    try { starshipVideo.pause(); } catch(e){}
    starshipVideo.removeAttribute("src");
    try { starshipVideo.load(); } catch(e){}

    canvas.classList.remove("hidden");
    document.getElementById("topTime").classList.remove("hidden");
    document.getElementById("controls").classList.remove("hidden");
  }

  function applyDailyAutomation(now = new Date()) {
    const key = todayKey(now);
    const h = now.getHours();
    const m = now.getMinutes();

    // 07:15 -> Reset + 45min + Start
    if (h === AUTO_START_H && m === AUTO_START_M && lastAutoStartKey !== key) {
      resetVideoState();
      remaining = MORNING_MINUTES * 60;
      document.getElementById("minutesInput").value = String(MORNING_MINUTES);
      running = true;
      lastAutoStartKey = key;
    }

    // 08:00 -> Reset + 0 + Stop (Video NICHT starten)
    if (h === AUTO_ZERO_H && m === AUTO_ZERO_M && lastAutoZeroKey !== key) {
      resetVideoState();
      remaining = 0;
      running = false;
      lastAutoZeroKey = key;
    }
  }

  // ---- Zeichnen ----
  function drawClockFace() {
    ctx.beginPath();
    ctx.arc(400, 400, 360, 0, 2 * Math.PI);
    ctx.fillStyle = "#f7f8fa";
    ctx.fill();
    ctx.lineWidth = 8;
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(400, 400, 340, 0, 2 * Math.PI);
    ctx.fillStyle = "#ffffff";
    ctx.fill();

    drawMinuteLabel(45);
    drawMinuteLabel(30);
    drawMinuteLabel(15);
  }

  function drawMinuteLabel(minute) {
    const angle = (minute / 60) * 2 * Math.PI - Math.PI / 2;
    const radius = 305;
    const x = 400 + radius * Math.cos(angle);
    const y = 400 + radius * Math.sin(angle);

    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(minute, x, y);
  }

  function drawTimerArc() {
    const progress = remaining / totalTime;
    const angle = progress * 2 * Math.PI;

    ctx.beginPath();
    ctx.moveTo(400, 400);
    ctx.arc(400, 400, 335, -Math.PI/2, angle - Math.PI/2, false);
    ctx.fillStyle = getColor(remaining);
    ctx.globalAlpha = 0.92;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function formatMMSS(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function drawRemaining() {
    ctx.fillStyle = "rgba(0,0,0,0.78)";
    ctx.font = "bold 86px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(formatMMSS(remaining), 400, 410);
  }

  function draw() {
    if (!canvas.classList.contains("hidden")) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawClockFace();
      drawTimerArc();
      drawRemaining();
    }
    requestAnimationFrame(draw);
  }

  // ---- Tick ----
  function tick() {
    applyDailyAutomation(new Date());

    if (running && remaining > 0) {
      remaining--;

      // Bei genau 10 Sekunden: Timer ausblenden, Video starten
      if (remaining === 10) {
        hideTimerShowVideo();
      }

      if (remaining === 0) {
        running = false;
      }
    }
  }

  // ---- Bedienung (ohne Passwort) ----
  const minutesInput = document.getElementById("minutesInput");

  function toggleTimer() {
    running = !running;
  }

  function setTimer() {
    let minutes = Number(minutesInput.value);
    if (!Number.isFinite(minutes)) minutes = 45;
    minutes = Math.max(1, Math.min(60, minutes));
    minutesInput.value = String(minutes);

    resetVideoState();
    remaining = minutes * 60;
  }

  document.getElementById("btnSet").addEventListener("click", setTimer);
  document.getElementById("btnToggle").addEventListener("click", toggleTimer);

  // ---- Uhrzeit oben ----
  const topTimeEl = document.getElementById("topTime");
  function updateTopTime() {
    const now = new Date();
    topTimeEl.textContent =
      String(now.getHours()).padStart(2, "0") + ":" +
      String(now.getMinutes()).padStart(2, "0");
  }

  setInterval(tick, 1000);
  setInterval(updateTopTime, 1000);

  updateTopTime();
  applyDailyAutomation(new Date());
  draw();
</script>

</body>
</html>
