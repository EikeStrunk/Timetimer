<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wand-Timer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #f3f5f8 0%, #dde3ea 55%, #cfd6df 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #topTime {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 44px;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 16px;
    border-radius: 14px;
  }

  canvas#timer {
    width: 85vmin;
    height: 85vmin;
    filter: drop-shadow(0 10px 35px rgba(0,0,0,0.18));
  }

  #controls {
    position: absolute;
    bottom: 18px;
    right: 18px;
    display: flex;
    gap: 10px;
    align-items: center;

    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 12px;
    border-radius: 14px;

    opacity: 0.45;
    transition: opacity 0.2s, transform 0.2s;
    user-select: none;
    touch-action: manipulation;
  }

  #controls:hover { opacity: 0.95; transform: translateY(-2px); }

  #controls input, #controls button {
    font-size: 16px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.75);
    color: rgba(0,0,0,0.85);
    outline: none;
    cursor: pointer;
  }

  #controls .label { font-size: 14px; color: rgba(0,0,0,0.65); }

  /* Film overlay */
  #rocketOverlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 70%, #0b1020 0%, #060812 60%, #000 100%);
    display: none;
    z-index: 9999;
  }

  #rocketCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Countdown HUD */
  #cinematicHud {
    position: fixed;
    inset: 0;
    z-index: 10000;
    display: none;
    pointer-events: none;
    align-items: center;
    justify-content: center;
  }
  #cinematicHud .count {
    font-size: min(20vh, 160px);
    font-weight: 900;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 10px 40px rgba(0,0,0,0.6);
    padding: 18px 26px;
    border-radius: 22px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .hidden { display: none !important; }
</style>
</head>

<body>
<div id="topTime"></div>
<canvas id="timer"></canvas>

<div id="controls">
  <span class="label">Min:</span>
  <input type="number" id="minutesInput" value="45" min="0" max="60">
  <span class="label">Sek:</span>
  <input type="number" id="secondsInput" value="0" min="0" max="59">
  <button id="btn15">15s</button>
  <button id="btnSet">Setzen</button>
  <button id="btnToggle">Start / Pause</button>
</div>

<div id="rocketOverlay">
  <canvas id="rocketCanvas"></canvas>
</div>

<div id="cinematicHud">
  <div class="count" id="countText">10</div>
</div>

<script>
/* ========= helpers (iOS12 canvas fix) ========= */
function roundRectPath(c, x, y, w, h, r) {
  r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

/* =========================
   Timer
========================= */
const canvas = document.getElementById("timer");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 800;

let totalTime = 60 * 60;
let remaining = 45 * 60;
let running = false;

let lastSpoken = null;

/* Version A Zeitautomatik */
const AUTO_START_H = 7, AUTO_START_M = 15;
const AUTO_ZERO_H  = 8, AUTO_ZERO_M  = 0;
const MORNING_MINUTES = 45;
let lastAutoStartKey = null;
let lastAutoZeroKey = null;

function todayKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function applyDailyAutomation(now = new Date()) {
  const key = todayKey(now);
  const h = now.getHours();
  const m = now.getMinutes();

  if (h === AUTO_START_H && m === AUTO_START_M && lastAutoStartKey !== key) {
    stopRocketFilm(true);
    remaining = MORNING_MINUTES * 60;
    minutesInput.value = String(MORNING_MINUTES);
    secondsInput.value = "0";
    running = true;
    lastAutoStartKey = key;
  }

  if (h === AUTO_ZERO_H && m === AUTO_ZERO_M && lastAutoZeroKey !== key) {
    stopRocketFilm(true);
    remaining = 0;
    running = false;
    lastAutoZeroKey = key;
  }
}

function getColor(secondsLeft) {
  if (secondsLeft > 45 * 60) return "#1a73e8";
  if (secondsLeft > 30 * 60) return "#3cb371";
  if (secondsLeft > 15 * 60) return "#e6b800";
  return "#d64545";
}

function drawClockFace() {
  ctx.beginPath();
  ctx.arc(400, 400, 360, 0, 2*Math.PI);
  ctx.fillStyle = "#f7f8fa";
  ctx.fill();
  ctx.lineWidth = 8;
  ctx.strokeStyle = "rgba(0,0,0,0.18)";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(400, 400, 340, 0, 2*Math.PI);
  ctx.fillStyle = "#ffffff";
  ctx.fill();

  drawMinuteLabel(45);
  drawMinuteLabel(30);
  drawMinuteLabel(15);
}

function drawMinuteLabel(minute) {
  const angle = (minute / 60) * 2*Math.PI - Math.PI/2;
  const radius = 305;
  const x = 400 + radius * Math.cos(angle);
  const y = 400 + radius * Math.sin(angle);

  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(minute, x, y);
}

function drawTimerArc() {
  const progress = remaining / totalTime;
  const angle = progress * 2*Math.PI;

  ctx.beginPath();
  ctx.moveTo(400, 400);
  ctx.arc(400, 400, 335, -Math.PI/2, angle - Math.PI/2, false);
  ctx.fillStyle = getColor(remaining);
  ctx.globalAlpha = 0.92;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function formatMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

function drawRemaining() {
  ctx.fillStyle = "rgba(0,0,0,0.78)";
  ctx.font = "bold 86px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(formatMMSS(remaining), 400, 410);
}

function draw() {
  if (!canvas.classList.contains("hidden")) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawClockFace();
    drawTimerArc();
    drawRemaining();
  }
  requestAnimationFrame(draw);
}

/* =========================
   Audio + Speech
========================= */
let audioCtx = null;
let speechPrimed = false;
let chosenVoice = null;

function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === "suspended" && audioCtx.resume) audioCtx.resume();
}

function primeSpeechOnce() {
  if (speechPrimed) return;
  speechPrimed = true;
  if (!("speechSynthesis" in window)) return;

  try {
    const voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
    chosenVoice =
      voices.find(v => (v.lang||"").toLowerCase().startsWith("de")) ||
      voices.find(v => (v.lang||"").toLowerCase().startsWith("en")) ||
      voices[0] || null;

    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(" ");
    if (chosenVoice) u.voice = chosenVoice;
    u.lang = (chosenVoice && chosenVoice.lang) ? chosenVoice.lang : "de-DE";
    u.volume = 0.01;
    speechSynthesis.speak(u);
    setTimeout(() => { try { speechSynthesis.cancel(); } catch(e) {} }, 120);
  } catch(e) {}
}

function beep(freq=660, ms=170, gain=0.18) {
  ensureAudio();
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.value = freq;

  osc.connect(g);
  g.connect(audioCtx.destination);

  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(gain, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms/1000);

  osc.start(t0);
  osc.stop(t0 + ms/1000);
}

function speakNumber(n) {
  if (!speechPrimed) return;
  if (!("speechSynthesis" in window)) return;

  try {
    const voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
    if (!chosenVoice && voices && voices.length) {
      chosenVoice =
        voices.find(v => (v.lang||"").toLowerCase().startsWith("de")) ||
        voices.find(v => (v.lang||"").toLowerCase().startsWith("en")) ||
        voices[0] || null;
    }

    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(n));
    if (chosenVoice) u.voice = chosenVoice;
    u.lang = (chosenVoice && chosenVoice.lang) ? chosenVoice.lang : "de-DE";
    u.rate = 1.02;
    u.volume = 1.0;
    speechSynthesis.speak(u);
  } catch(e) {}
}

/* =========================
   Cinematic Film
========================= */
const rocketOverlay = document.getElementById("rocketOverlay");
const rocketCanvas = document.getElementById("rocketCanvas");
const rctx = rocketCanvas.getContext("2d");

const cinematicHud = document.getElementById("cinematicHud");
const countText = document.getElementById("countText");

let rocketRAF = null;
let filmMode = "off"; // film | idle | off
let filmStart = 0;
let idleStart = 0;

let starsFar = [], starsMid = [], starsNear = [];
let smoke = [], sparks = [];

function resizeRocketCanvas() {
  rocketCanvas.width = Math.floor(window.innerWidth * devicePixelRatio);
  rocketCanvas.height = Math.floor(window.innerHeight * devicePixelRatio);
}

function initStarfields() {
  const w = rocketCanvas.width, h = rocketCanvas.height;

  function makeStars(count, sizeMin, sizeMax, alphaMin, alphaMax) {
    const arr = [];
    for (let i=0; i<count; i++) {
      arr.push({
        x: Math.random()*w,
        y: Math.random()*h,
        r: (Math.random()*(sizeMax-sizeMin)+sizeMin)*devicePixelRatio,
        a: Math.random()*(alphaMax-alphaMin)+alphaMin,
        tw: Math.random()*1.4+0.2
      });
    }
    return arr;
  }

  starsFar  = makeStars(Math.floor((w*h)/90000), 0.35, 0.9, 0.10, 0.40);
  starsMid  = makeStars(Math.floor((w*h)/140000), 0.7,  1.6, 0.20, 0.60);
  starsNear = makeStars(Math.floor((w*h)/220000), 1.1,  2.4, 0.25, 0.80);

  smoke = [];
  sparks = [];
}

function spawnSmoke(x,y,intensity=1) {
  const n = Math.floor(10 * intensity);
  for (let i=0; i<n; i++) {
    smoke.push({
      x, y,
      vx: (Math.random()*2-1) * (2.0*devicePixelRatio) * intensity,
      vy: (Math.random()*1.2 + 2.2) * devicePixelRatio,
      r: (Math.random()*18 + 14) * devicePixelRatio * (0.9 + 0.4*intensity),
      a: 0.48,
      life: Math.random()*80 + 70
    });
  }
}

function updateParticles() {
  for (let i=smoke.length-1; i>=0; i--) {
    const p = smoke[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05 * devicePixelRatio;
    p.r *= 0.987;
    p.a *= 0.988;
    p.life -= 1;
    if (p.life <= 0 || p.a < 0.02 || p.r < 1) smoke.splice(i,1);
  }
}

function drawParticles() {
  for (const p of smoke) {
    rctx.beginPath();
    rctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    rctx.fillStyle = `rgba(220,230,240,${p.a})`;
    rctx.fill();
  }
}

function drawNebula(t, w, h) {
  const g1 = rctx.createRadialGradient(w*0.25, h*0.35, 0, w*0.25, h*0.35, w*0.65);
  g1.addColorStop(0, `rgba(120,80,255,${0.08 + 0.02*Math.sin(t*0.3)})`);
  g1.addColorStop(1, "rgba(0,0,0,0)");
  rctx.fillStyle = g1;
  rctx.fillRect(0,0,w,h);

  const g2 = rctx.createRadialGradient(w*0.75, h*0.55, 0, w*0.75, h*0.55, w*0.7);
  g2.addColorStop(0, `rgba(40,200,255,${0.06 + 0.02*Math.sin(t*0.22+1.2)})`);
  g2.addColorStop(1, "rgba(0,0,0,0)");
  rctx.fillStyle = g2;
  rctx.fillRect(0,0,w,h);
}

function drawStars(arr, t, dx, dy) {
  const w = rocketCanvas.width, h = rocketCanvas.height;
  const wrap = (v, max) => (v % max + max) % max;

  for (const st of arr) {
    const tw = 0.55 + 0.45*Math.sin(t*st.tw + st.x*0.001);
    const x = wrap(st.x + dx, w);
    const y = wrap(st.y + dy, h);

    rctx.beginPath();
    rctx.arc(x, y, st.r, 0, Math.PI*2);
    rctx.fillStyle = `rgba(255,255,255,${st.a*tw})`;
    rctx.fill();
  }
}

function drawVignette(w,h){
  const vg = rctx.createRadialGradient(w*0.5, h*0.5, Math.min(w,h)*0.15, w*0.5, h*0.5, Math.max(w,h)*0.65);
  vg.addColorStop(0, "rgba(0,0,0,0)");
  vg.addColorStop(1, "rgba(0,0,0,0.35)");
  rctx.fillStyle = vg;
  rctx.fillRect(0,0,w,h);
}

/* Starship (no roundRect, iOS12 safe) */
function drawStarshipAtEngineBase(x, engineBaseY, scale, t, phase) {
  const s = scale;

  rctx.save();
  rctx.translate(x, engineBaseY);
  rctx.scale(s, s);

  const bodyW = 34;
  const bodyH = 170;
  const left = -bodyW/2;

  const steel = rctx.createLinearGradient(left, 0, left + bodyW, 0);
  steel.addColorStop(0.0, "rgba(200,205,210,0.96)");
  steel.addColorStop(0.22, "rgba(245,246,248,0.98)");
  steel.addColorStop(0.52, "rgba(185,190,196,0.96)");
  steel.addColorStop(0.76, "rgba(255,255,255,0.94)");
  steel.addColorStop(1.0, "rgba(165,170,176,0.96)");

  // body
  roundRectPath(rctx, left, -bodyH, bodyW, bodyH, 14);
  rctx.fillStyle = steel;
  rctx.fill();

  // nose
  rctx.beginPath();
  rctx.moveTo(left, -bodyH + 10);
  rctx.quadraticCurveTo(0, -bodyH - 62, left + bodyW, -bodyH + 10);
  rctx.closePath();
  rctx.fillStyle = steel;
  rctx.fill();

  // tile lines
  rctx.globalAlpha = 0.20;
  rctx.strokeStyle = "rgba(0,0,0,0.35)";
  rctx.lineWidth = 1;
  for (let yy = -bodyH + 28; yy < -16; yy += 16) {
    rctx.beginPath();
    rctx.moveTo(left + 4, yy);
    rctx.lineTo(left + bodyW - 4, yy);
    rctx.stroke();
  }
  rctx.globalAlpha = 1;

  const flap = "rgba(60,65,72,0.9)";
  // forward flaps
  rctx.beginPath();
  rctx.moveTo(left, -bodyH + 44);
  rctx.lineTo(left - 18, -bodyH + 58);
  rctx.lineTo(left, -bodyH + 70);
  rctx.closePath();
  rctx.fillStyle = flap;
  rctx.fill();

  rctx.beginPath();
  rctx.moveTo(left + bodyW, -bodyH + 44);
  rctx.lineTo(left + bodyW + 18, -bodyH + 58);
  rctx.lineTo(left + bodyW, -bodyH + 70);
  rctx.closePath();
  rctx.fill();

  // aft flaps
  rctx.beginPath();
  rctx.moveTo(left, -38);
  rctx.lineTo(left - 20, -22);
  rctx.lineTo(left, -10);
  rctx.closePath();
  rctx.fill();

  rctx.beginPath();
  rctx.moveTo(left + bodyW, -38);
  rctx.lineTo(left + bodyW + 20, -22);
  rctx.lineTo(left + bodyW, -10);
  rctx.closePath();
  rctx.fill();

  // engine skirt
  rctx.globalAlpha = 0.35;
  rctx.fillStyle = "rgba(0,0,0,1)";
  roundRectPath(rctx, left + 4, -14, bodyW - 8, 14, 8);
  rctx.fill();
  rctx.globalAlpha = 1;

  // plume
  if (phase !== "idle") {
    const wobble = 0.35 + 0.15*Math.sin(t*12);
    const flameLen =
      (phase === "launch") ? (95 + 45*wobble) :
      (phase === "climb")  ? (60 + 22*wobble) :
                             (46 + 16*wobble);

    const outer = (phase === "cruise") ? "rgba(120,200,255,0.22)" : "rgba(255,170,60,0.28)";
    const inner = (phase === "cruise") ? "rgba(210,245,255,0.75)" : "rgba(255,245,210,0.75)";

    rctx.beginPath();
    rctx.moveTo(0, 0);
    rctx.quadraticCurveTo(-18, flameLen*0.55, 0, flameLen);
    rctx.quadraticCurveTo(18, flameLen*0.55, 0, 0);
    rctx.fillStyle = outer;
    rctx.fill();

    rctx.beginPath();
    rctx.moveTo(0, 2);
    rctx.quadraticCurveTo(-9, flameLen*0.52, 0, flameLen*0.80);
    rctx.quadraticCurveTo(9, flameLen*0.52, 0, 2);
    rctx.fillStyle = inner;
    rctx.fill();
  }

  rctx.restore();
}

function filmFrame(ts) {
  if (filmMode === "off") return;

  const w = rocketCanvas.width;
  const h = rocketCanvas.height;

  if (filmMode === "idle") {
    if (!idleStart) idleStart = ts;
    const t = (ts - idleStart) / 1000;

    rctx.clearRect(0,0,w,h);
    drawNebula(t,w,h);

    const farDx  = -t * 1.2 * devicePixelRatio;
    const farDy  =  t * 0.5 * devicePixelRatio;
    const midDx  = -t * 2.2 * devicePixelRatio;
    const midDy  =  t * 0.8 * devicePixelRatio;
    const nearDx = -t * 3.6 * devicePixelRatio;
    const nearDy =  t * 1.2 * devicePixelRatio;

    drawStars(starsFar,  t, farDx,  farDy);
    drawStars(starsMid,  t, midDx,  midDy);
    drawStars(starsNear, t, nearDx, nearDy);

    drawVignette(w,h);
    rocketRAF = requestAnimationFrame(filmFrame);
    return;
  }

  if (!filmStart) filmStart = ts;
  const t = (ts - filmStart) / 1000;

  if (t >= 60) {
    filmMode = "idle";
    idleStart = 0;
    cinematicHud.style.display = "none";
    rocketRAF = requestAnimationFrame(filmFrame);
    return;
  }

  const camDriftX = Math.sin(t*0.12) * 18 * devicePixelRatio;
  const camDriftY = Math.cos(t*0.10) * 12 * devicePixelRatio;

  rctx.clearRect(0,0,w,h);
  drawNebula(t,w,h);

  const farDx  = -t * 6  * devicePixelRatio + camDriftX*0.15;
  const farDy  =  t * 2  * devicePixelRatio + camDriftY*0.15;
  const midDx  = -t * 14 * devicePixelRatio + camDriftX*0.30;
  const midDy  =  t * 5  * devicePixelRatio + camDriftY*0.30;
  const nearDx = -t * 28 * devicePixelRatio + camDriftX*0.55;
  const nearDy =  t * 10 * devicePixelRatio + camDriftY*0.55;

  drawStars(starsFar,  t, farDx,  farDy);
  drawStars(starsMid,  t, midDx,  midDy);
  drawStars(starsNear, t, nearDx, nearDy);

  let phase = "cruise";
  let rocketX = w*0.5 + Math.sin(t*0.7) * 20 * devicePixelRatio + camDriftX;
  let engineBaseY;

  if (t < 8) {
    phase = "launch";
    const k = t/8;
    engineBaseY = h*0.82 - (k*k) * (h*0.56) + camDriftY;
    spawnSmoke(rocketX, engineBaseY + 140*devicePixelRatio, 1.10);
  } else if (t < 18) {
    phase = "climb";
    const k = (t-8)/10;
    engineBaseY = h*0.34 - (k) * (h*0.12) + camDriftY;
    spawnSmoke(rocketX, engineBaseY + 120*devicePixelRatio, 0.60);
  } else {
    phase = "cruise";
    rocketX = w*0.46 + Math.sin(t*0.9) * 28 * devicePixelRatio + camDriftX;
    engineBaseY = h*0.55 + Math.cos(t*0.7) * 22 * devicePixelRatio + camDriftY;
    spawnSmoke(rocketX - 10*devicePixelRatio, engineBaseY + 115*devicePixelRatio, 0.28);
  }

  // clamp engine base so it stays on screen
  engineBaseY = Math.max(h*0.28, Math.min(h*0.85, engineBaseY));

  updateParticles();
  drawParticles();
  drawVignette(w,h);

  // slightly smaller scale = safer on iPad screens
  drawStarshipAtEngineBase(rocketX, engineBaseY, 1.25*devicePixelRatio, t, phase);

  rocketRAF = requestAnimationFrame(filmFrame);
}

function startRocketFilm() {
  canvas.classList.add("hidden");
  document.getElementById("controls").classList.add("hidden");
  document.getElementById("topTime").classList.add("hidden");

  rocketOverlay.style.display = "block";
  cinematicHud.style.display = "none";

  resizeRocketCanvas();
  initStarfields();
  filmStart = 0;
  idleStart = 0;
  filmMode = "film";

  if (rocketRAF) cancelAnimationFrame(rocketRAF);
  rocketRAF = requestAnimationFrame(filmFrame);
}

function stopRocketFilm(forceBackToTimer=false) {
  filmMode = "off";
  if (rocketRAF) cancelAnimationFrame(rocketRAF);
  rocketRAF = null;
  cinematicHud.style.display = "none";
  rocketOverlay.style.display = "none";

  if (forceBackToTimer) {
    canvas.classList.remove("hidden");
    document.getElementById("controls").classList.remove("hidden");
    document.getElementById("topTime").classList.remove("hidden");
  }
}

/* =========================
   Countdown + Tick (SYNC)
========================= */
function showCountdownHud(n) {
  cinematicHud.style.display = "flex";
  countText.textContent = String(n);
}
function hideCountdownHud() {
  cinematicHud.style.display = "none";
}

function tick() {
  applyDailyAutomation(new Date());

  if (running && remaining > 0) {
    remaining--; // sync

    if (remaining <= 10 && remaining >= 1) {
      canvas.classList.add("hidden");
      document.getElementById("controls").classList.add("hidden");
      document.getElementById("topTime").classList.add("hidden");

      showCountdownHud(remaining);

      if (lastSpoken !== remaining) {
        lastSpoken = remaining;
        beep(remaining <= 3 ? 740 : 660, 170, 0.18);
        speakNumber(remaining);
      }
    } else {
      if (filmMode === "off") {
        canvas.classList.remove("hidden");
        document.getElementById("controls").classList.remove("hidden");
        document.getElementById("topTime").classList.remove("hidden");
      }
      hideCountdownHud();
      lastSpoken = null;
    }

    if (remaining === 0) {
      running = false;
      hideCountdownHud();
      lastSpoken = null;

      beep(980, 220, 0.22);
      speakNumber(0);

      startRocketFilm();
    }
  }
}

/* =========================
   Controls
========================= */
const minutesInput = document.getElementById("minutesInput");
const secondsInput = document.getElementById("secondsInput");

function clampInt(v, min, max, fallback) {
  const n = Number(v);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, Math.floor(n)));
}

function setTimer() {
  const mins = clampInt(minutesInput.value, 0, 60, 45);
  const secs = clampInt(secondsInput.value, 0, 59, 0);
  minutesInput.value = String(mins);
  secondsInput.value = String(secs);

  stopRocketFilm(true);
  remaining = mins*60 + secs;
  if (remaining <= 0) remaining = 1;

  lastSpoken = null;
  hideCountdownHud();
}

function toggleTimer() {
  ensureAudio();
  primeSpeechOnce();
  running = !running;
}

document.getElementById("btnSet").addEventListener("click", () => {
  ensureAudio();
  primeSpeechOnce();
  setTimer();
});
document.getElementById("btnToggle").addEventListener("click", toggleTimer);

document.getElementById("btn15").addEventListener("click", () => {
  ensureAudio();
  primeSpeechOnce();
  minutesInput.value = "0";
  secondsInput.value = "15";
  setTimer();
});

/* =========================
   Top time
========================= */
const topTimeEl = document.getElementById("topTime");
function updateTopTime() {
  const now = new Date();
  topTimeEl.textContent =
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0");
}

setInterval(tick, 1000);
setInterval(updateTopTime, 1000);

updateTopTime();
applyDailyAutomation(new Date());
draw();
</script>
