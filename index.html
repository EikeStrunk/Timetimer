<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- iOS "Web-App"-Modus -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wand-Timer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #f3f5f8 0%, #dde3ea 55%, #cfd6df 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #topTime {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 44px;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 16px;
    border-radius: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  canvas {
    width: 85vmin;
    height: 85vmin;
    filter: drop-shadow(0 10px 35px rgba(0,0,0,0.18));
  }

  #controls {
    position: absolute;
    bottom: 18px;
    right: 18px;
    display: flex;
    gap: 10px;
    align-items: center;

    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,0,0,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 10px 12px;
    border-radius: 14px;

    opacity: 0.35;
    transition: opacity 180ms ease, transform 180ms ease;
    user-select: none;
    touch-action: manipulation;
  }

  #controls:hover,
  #controls:focus-within {
    opacity: 0.95;
    transform: translateY(-2px);
  }

  #controls .label {
    font-size: 14px;
    color: rgba(0,0,0,0.65);
    margin-right: 2px;
  }

  #controls input,
  #controls button {
    font-size: 16px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.75);
    color: rgba(0,0,0,0.85);
    outline: none;
  }

  #controls button { cursor: pointer; }
  #controls button:active { transform: translateY(1px); }

  .lockedHint {
    font-size: 14px;
    color: rgba(0,0,0,0.55);
    padding-left: 2px;
  }

  .hidden { display: none !important; }

  /* Vollbild-Video Overlay */
  #videoOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 9999;
  }
  #videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }

  /* Audio-Prime Overlay (einmal tippen) */
  #audioPrimeOverlay {
    position: fixed;
    inset: 0;
    z-index: 10000;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #audioPrimeOverlay .box {
    background: rgba(255,255,255,0.92);
    border-radius: 18px;
    padding: 22px 20px;
    width: min(560px, 86vw);
    text-align: center;
    border: 1px solid rgba(0,0,0,0.12);
  }
  #audioPrimeOverlay .title {
    font-size: 26px;
    font-weight: 700;
    color: rgba(0,0,0,0.85);
    margin-bottom: 10px;
  }
  #audioPrimeOverlay .sub {
    font-size: 16px;
    color: rgba(0,0,0,0.65);
    line-height: 1.3;
    margin-bottom: 16px;
  }
  #audioPrimeOverlay button {
    font-size: 20px;
    padding: 12px 18px;
    border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.16);
    background: rgba(26,115,232,0.95);
    color: #fff;
    cursor: pointer;
  }

  /* Fallback Start Overlay wenn iOS blockt */
  #videoStartOverlay {
    position: fixed;
    inset: 0;
    display: none;
    z-index: 10001;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #videoStartOverlay .box {
    background: rgba(255,255,255,0.92);
    border-radius: 18px;
    padding: 22px 20px;
    width: min(560px, 86vw);
    text-align: center;
    border: 1px solid rgba(0,0,0,0.12);
  }
  #videoStartOverlay .title {
    font-size: 22px;
    font-weight: 700;
    color: rgba(0,0,0,0.85);
    margin-bottom: 10px;
  }
  #videoStartOverlay .sub {
    font-size: 16px;
    color: rgba(0,0,0,0.65);
    line-height: 1.3;
    margin-bottom: 16px;
  }
  #videoStartOverlay button {
    font-size: 22px;
    padding: 14px 20px;
    border-radius: 16px;
    border: 1px solid rgba(0,0,0,0.16);
    background: rgba(0,0,0,0.86);
    color: #fff;
    cursor: pointer;
  }
</style>
</head>

<body>
  <div id="topTime">--:--</div>
  <canvas id="timer"></canvas>

  <div id="controls" aria-label="Timer-Steuerung">
    <span class="label">Min:</span>
    <input type="number" id="minutesInput" value="45" min="1" max="60" />
    <button id="btnSet">Setzen</button>
    <button id="btnToggle">Start / Pause</button>
    <button id="btnLock">🔒</button>
    <span id="lockState" class="lockedHint">gesperrt</span>
  </div>

  <!-- Audio-Prime Overlay -->
  <div id="audioPrimeOverlay">
    <div class="box">
      <div class="title">Audio aktivieren</div>
      <div class="sub">
        iPadOS 12 blockiert Ton ohne Nutzeraktion.<br>
        Bitte <b>einmal tippen</b>, damit das Video später <b>mit Ton</b> startet.
      </div>
      <button id="btnPrimeAudio">🔊 Tippen um Audio zu aktivieren</button>
    </div>
  </div>

  <!-- Video Overlay -->
  <div id="videoOverlay">
    <video id="starshipVideo" playsinline webkit-playsinline preload="auto"></video>
  </div>

  <!-- Fallback Overlay -->
  <div id="videoStartOverlay">
    <div class="box">
      <div class="title">Audio noch gesperrt</div>
      <div class="sub">
        Bitte einmal starten, dann ist Audio dauerhaft freigeschaltet.
      </div>
      <button id="btnStartVideoPrime">▶ Audio aktivieren</button>
    </div>
  </div>

<script>
  const canvas = document.getElementById("timer");
  const ctx = canvas.getContext("2d");

  canvas.width = 800;
  canvas.height = 800;

  let totalTime = 60 * 60;
  let remaining = 45 * 60;
  let running = false;

  // ---- Tages-Automatik (Version A) ----
  const AUTO_START_H = 7, AUTO_START_M = 15;
  const AUTO_ZERO_H  = 8, AUTO_ZERO_M  = 0;
  const MORNING_MINUTES = 45;

  let lastAutoStartKey = null;
  let lastAutoZeroKey = null;

  function todayKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const da = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${da}`;
  }

  // ---- Passwort-Sperre ----
  const PASSWORD = "strunk";
  let unlockedUntil = 0;
  const UNLOCK_MS = 2 * 60 * 1000;

  const lockStateEl = document.getElementById("lockState");
  const btnLock = document.getElementById("btnLock");

  function isUnlocked() { return Date.now() < unlockedUntil; }

  function updateLockUI() {
    if (isUnlocked()) {
      const secs = Math.max(0, Math.ceil((unlockedUntil - Date.now()) / 1000));
      lockStateEl.textContent = `entsperrt (${secs}s)`;
      btnLock.textContent = "🔓";
    } else {
      lockStateEl.textContent = "gesperrt";
      btnLock.textContent = "🔒";
    }
  }

  function requireUnlock() {
    if (isUnlocked()) return true;
    const entered = window.prompt("Passwort eingeben:");
    if (entered === null) return false;
    if (entered === PASSWORD) {
      unlockedUntil = Date.now() + UNLOCK_MS;
      updateLockUI();
      return true;
    }
    alert("Falsches Passwort.");
    return false;
  }

  btnLock.addEventListener("click", () => {
    if (isUnlocked()) { unlockedUntil = 0; updateLockUI(); }
    else { requireUnlock(); }
  });

  // ---- Farben: >45 blau, >30 grün, >15 gelb, <=15 rot ----
  function getColor(secondsLeft) {
    if (secondsLeft > 45 * 60) return "#1a73e8";
    if (secondsLeft > 30 * 60) return "#3cb371";
    if (secondsLeft > 15 * 60) return "#e6b800";
    return "#d64545";
  }

  // ---- Video / Audio Prime ----
  const videoOverlay = document.getElementById("videoOverlay");
  const starshipVideo = document.getElementById("starshipVideo");
  const audioPrimeOverlay = document.getElementById("audioPrimeOverlay");
  const btnPrimeAudio = document.getElementById("btnPrimeAudio");

  const videoStartOverlay = document.getElementById("videoStartOverlay");
  const btnStartVideoPrime = document.getElementById("btnStartVideoPrime");

  // Wenn Video im Unterordner: z.B. "videos/Starship%203.mp4"
  const VIDEO_SRC = "Starship%203.mp4";

  // Merken
  const AUDIO_KEY = "wandTimer_audioPrimed_v1";
  let audioPrimed = (localStorage.getItem(AUDIO_KEY) === "1");

  // Timer->Video bei 10s
  let videoStarted = false;

  function showPrimeOverlayIfNeeded() {
    if (audioPrimed) {
      audioPrimeOverlay.style.display = "none";
    } else {
      audioPrimeOverlay.style.display = "flex";
    }
  }

  function setPrimed() {
    audioPrimed = true;
    localStorage.setItem(AUDIO_KEY, "1");
    audioPrimeOverlay.style.display = "none";
    videoStartOverlay.style.display = "none";
  }

  // Der Fix: beim Priming das Video-Overlay kurz sichtbar machen (nicht display:none),
  // sonst rejectet iOS 12 oft play().
  async function primeAudioWithUserGesture() {
    try {
      // Overlay sichtbar (schwarz), Video ist im DOM sichtbar
      videoOverlay.style.display = "block";

      starshipVideo.src = VIDEO_SRC;
      starshipVideo.preload = "auto";
      starshipVideo.currentTime = 0;

      // Erst stumm starten (das geht am leichtesten)
      starshipVideo.muted = true;
      starshipVideo.volume = 0;

      // Wichtig: play() direkt im Klick-Handler
      await starshipVideo.play();

      // Kurz laufen lassen, dann pausieren + Ton erlauben
      setTimeout(() => {
        try { starshipVideo.pause(); } catch(e){}
        starshipVideo.muted = false;
        starshipVideo.volume = 1.0;

        // Overlay wieder aus (wir primen nur)
        videoOverlay.style.display = "none";

        setPrimed();
      }, 300);

    } catch (e) {
      // Wenn das blockt, geben wir eine zweite sichere Variante:
      // User klickt "▶ Audio aktivieren", dann starten wir das Video sichtbar.
      videoOverlay.style.display = "none";
      videoStartOverlay.style.display = "flex";
    }
  }

  btnPrimeAudio.addEventListener("click", () => {
    primeAudioWithUserGesture();
  });

  // Fallback: explizites Starten (User Gesture) -> danach merken
  btnStartVideoPrime.addEventListener("click", async () => {
    try {
      videoOverlay.style.display = "block";
      videoStartOverlay.style.display = "none";

      starshipVideo.src = VIDEO_SRC;
      starshipVideo.currentTime = 0;

      // Jetzt darf es auch direkt mit Ton sein, aber sicherer: erst stumm 100ms
      starshipVideo.muted = true;
      starshipVideo.volume = 0;

      await starshipVideo.play();

      setTimeout(() => {
        starshipVideo.muted = false;
        starshipVideo.volume = 1.0;
        try { starshipVideo.pause(); } catch(e){}
        videoOverlay.style.display = "none";
        setPrimed();
      }, 350);

    } catch (e) {
      alert("Audio konnte nicht aktiviert werden. Bitte nochmal tippen.");
      videoOverlay.style.display = "none";
      videoStartOverlay.style.display = "none";
    }
  });

  function hideTimerShowVideo() {
    if (videoStarted) return;
    videoStarted = true;

    document.getElementById("topTime").classList.add("hidden");
    document.getElementById("controls").classList.add("hidden");
    canvas.classList.add("hidden");

    videoOverlay.style.display = "block";
    videoStartOverlay.style.display = "none";

    starshipVideo.src = VIDEO_SRC;
    starshipVideo.currentTime = 0;

    // Ton AN
    starshipVideo.muted = false;
    starshipVideo.volume = 1.0;

    const p = starshipVideo.play();
    if (p && typeof p.catch === "function") {
      p.catch(() => {
        // Wenn iOS trotz Priming blockt: Start Overlay zeigen
        videoStartOverlay.style.display = "flex";
      });
    }
  }

  // Wenn Video-Ende: UI zurück
  starshipVideo.addEventListener("ended", () => {
    videoOverlay.style.display = "none";
    videoStartOverlay.style.display = "none";

    canvas.classList.remove("hidden");
    document.getElementById("topTime").classList.remove("hidden");
    document.getElementById("controls").classList.remove("hidden");
  });

  function resetVideoState() {
    videoStarted = false;
    videoOverlay.style.display = "none";
    videoStartOverlay.style.display = "none";
    try { starshipVideo.pause(); } catch(e){}

    canvas.classList.remove("hidden");
    document.getElementById("topTime").classList.remove("hidden");
    document.getElementById("controls").classList.remove("hidden");
  }

  function applyDailyAutomation(now = new Date()) {
    const key = todayKey(now);
    const h = now.getHours();
    const m = now.getMinutes();

    if (h === AUTO_START_H && m === AUTO_START_M && lastAutoStartKey !== key) {
      resetVideoState();
      remaining = MORNING_MINUTES * 60;
      document.getElementById("minutesInput").value = String(MORNING_MINUTES);
      running = true;
      lastAutoStartKey = key;
    }

    if (h === AUTO_ZERO_H && m === AUTO_ZERO_M && lastAutoZeroKey !== key) {
      resetVideoState();
      remaining = 0;
      running = false;
      lastAutoZeroKey = key;
    }
  }

  // ---- Zeichnen ----
  function drawClockFace() {
    ctx.beginPath();
    ctx.arc(400, 400, 360, 0, 2 * Math.PI);
    ctx.fillStyle = "#f7f8fa";
    ctx.fill();
    ctx.lineWidth = 8;
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(400, 400, 340, 0, 2 * Math.PI);
    ctx.fillStyle = "#ffffff";
    ctx.fill();

    drawMinuteLabel(45);
    drawMinuteLabel(30);
    drawMinuteLabel(15);
  }

  function drawMinuteLabel(minute) {
    const angle = (minute / 60) * 2 * Math.PI - Math.PI / 2;
    const radius = 305;
    const x = 400 + radius * Math.cos(angle);
    const y = 400 + radius * Math.sin(angle);

    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(minute, x, y);
  }

  function drawTimerArc() {
    const progress = remaining / totalTime;
    const angle = progress * 2 * Math.PI;

    ctx.beginPath();
    ctx.moveTo(400, 400);
    ctx.arc(400, 400, 335, -Math.PI/2, angle - Math.PI/2, false);
    ctx.fillStyle = getColor(remaining);
    ctx.globalAlpha = 0.92;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function formatMMSS(sec) {
    const mm = Math.floor(sec / 60);
    const ss = sec % 60;
    return `${mm}:${String(ss).padStart(2, "0")}`;
  }

  function drawRemaining() {
    ctx.fillStyle = "rgba(0,0,0,0.78)";
    ctx.font = "bold 86px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(formatMMSS(remaining), 400, 410);
  }

  function draw() {
    if (!canvas.classList.contains("hidden")) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawClockFace();
      drawTimerArc();
      drawRemaining();
    }
    requestAnimationFrame(draw);
  }

  // ---- Tick ----
  function tick() {
    applyDailyAutomation(new Date());

    if (running && remaining > 0) {
      remaining--;

      // bei 10 Sekunden Video starten
      if (remaining === 10) {
        hideTimerShowVideo();
      }

      if (remaining === 0) running = false;
    }
  }

  // ---- Bedienung nur entsperrt ----
  const minutesInput = document.getElementById("minutesInput");
  let lastMinutesValue = minutesInput.value;

  function toggleTimer() { running = !running; }

  function setTimer() {
    let minutes = Number(minutesInput.value);
    if (!Number.isFinite(minutes)) minutes = 45;
    minutes = Math.max(1, Math.min(60, minutes));
    minutesInput.value = String(minutes);

    resetVideoState();
    remaining = minutes * 60;
  }

  document.getElementById("btnSet").addEventListener("click", () => {
    if (!requireUnlock()) return;
    setTimer();
  });

  document.getElementById("btnToggle").addEventListener("click", () => {
    if (!requireUnlock()) return;
    toggleTimer();
  });

  minutesInput.addEventListener("focus", () => {
    lastMinutesValue = minutesInput.value;
    if (!requireUnlock()) {
      setTimeout(() => {
        minutesInput.value = lastMinutesValue;
        minutesInput.blur();
      }, 0);
    }
  });

  minutesInput.addEventListener("change", () => {
    if (!isUnlocked()) minutesInput.value = lastMinutesValue;
    else lastMinutesValue = minutesInput.value;
  });

  // ---- Uhrzeit oben ----
  const topTimeEl = document.getElementById("topTime");
  function updateTopTime() {
    const now = new Date();
    topTimeEl.textContent =
      String(now.getHours()).padStart(2, "0") + ":" +
      String(now.getMinutes()).padStart(2, "0");
  }

  setInterval(tick, 1000);
  setInterval(updateTopTime, 1000);
  setInterval(updateLockUI, 250);

  updateTopTime();
  updateLockUI();
  applyDailyAutomation(new Date());
  draw();

  // Prime Overlay nur zeigen, wenn noch nicht gemerkt
  showPrimeOverlayIfNeeded();
</script>
</body>
</html>
