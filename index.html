<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wand-Timer</title>

<style>
  body{
    margin:0;height:100vh;display:flex;justify-content:center;align-items:center;
    background:radial-gradient(circle at center,#f3f5f8 0%,#dde3ea 55%,#cfd6df 100%);
    font-family:Arial,sans-serif;overflow:hidden;
  }
  #topTime{
    position:absolute;top:18px;left:50%;transform:translateX(-50%);
    font-size:44px;font-weight:700;color:rgba(0,0,0,0.75);letter-spacing:.5px;
    background:rgba(255,255,255,0.45);border:1px solid rgba(0,0,0,0.08);
    padding:10px 16px;border-radius:14px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  canvas{width:85vmin;height:85vmin;filter:drop-shadow(0 10px 35px rgba(0,0,0,0.18));}

  #controls{
    position:absolute;bottom:18px;right:18px;display:flex;gap:10px;align-items:center;
    background:rgba(255,255,255,0.55);border:1px solid rgba(0,0,0,0.08);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    padding:10px 12px;border-radius:14px;
    opacity:.35;transition:opacity 180ms ease, transform 180ms ease;
    user-select:none;touch-action:manipulation;
  }
  #controls:hover,#controls:focus-within{opacity:.95;transform:translateY(-2px);}
  #controls .label{font-size:14px;color:rgba(0,0,0,0.65);margin-right:2px;}
  #controls input,#controls button{
    font-size:16px;padding:8px 10px;border-radius:10px;
    border:1px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.75);
    color:rgba(0,0,0,0.85);outline:none;
  }
  #controls button{cursor:pointer;}
  #controls button:active{transform:translateY(1px);}
  .lockedHint{font-size:14px;color:rgba(0,0,0,0.55);padding-left:2px;}
  .hidden{display:none!important;}

  /* Video Vollbild */
  #videoOverlay{
    position:fixed;inset:0;background:#000;display:none;z-index:9999;
  }
  #videoOverlay video{
    width:100%;height:100%;object-fit:cover;background:#000;
  }

  /* Audio-Prime Overlay */
  #audioPrimeOverlay{
    position:fixed;inset:0;z-index:10000;display:none;
    align-items:center;justify-content:center;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  #audioPrimeOverlay .box{
    background:rgba(255,255,255,0.92);border-radius:18px;
    padding:22px 20px;width:min(560px,86vw);text-align:center;
    border:1px solid rgba(0,0,0,0.12);
  }
  #audioPrimeOverlay .title{font-size:26px;font-weight:700;color:rgba(0,0,0,0.85);margin-bottom:10px;}
  #audioPrimeOverlay .sub{font-size:16px;color:rgba(0,0,0,0.65);line-height:1.3;margin-bottom:16px;}
  #audioPrimeOverlay button{
    font-size:20px;padding:12px 18px;border-radius:14px;
    border:1px solid rgba(0,0,0,0.16);background:rgba(26,115,232,0.95);
    color:#fff;cursor:pointer;
  }
  #audioPrimeOverlay .status{
    margin-top:12px;font-size:14px;color:rgba(0,0,0,0.65);
  }

  /* Fallback: wenn Video mit Ton trotzdem blockt */
  #videoStartOverlay{
    position:fixed;inset:0;display:none;z-index:10001;
    align-items:center;justify-content:center;background:rgba(0,0,0,0.55);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  #videoStartOverlay button{
    font-size:26px;padding:16px 22px;border-radius:18px;
    border:1px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.92);
    color:rgba(0,0,0,0.85);cursor:pointer;
  }
</style>
</head>

<body>
  <div id="topTime">--:--</div>
  <canvas id="timer"></canvas>

  <div id="controls" aria-label="Timer-Steuerung">
    <span class="label">Min:</span>
    <input type="number" id="minutesInput" value="45" min="1" max="60" />
    <button id="btnSet">Setzen</button>
    <button id="btnToggle">Start / Pause</button>
    <button id="btnLock">🔒</button>
    <span id="lockState" class="lockedHint">gesperrt</span>
  </div>

  <!-- Audio Prime -->
  <div id="audioPrimeOverlay">
    <div class="box">
      <div class="title">Audio aktivieren</div>
      <div class="sub">
        iPadOS 12 braucht <b>eine</b> Nutzeraktion, damit später ein Video <b>mit Ton</b> automatisch starten kann.
      </div>
      <button id="btnPrimeAudio">🔊 Einmal tippen</button>
      <div id="primeStatus" class="status"></div>
    </div>
  </div>

  <!-- Video -->
  <div id="videoOverlay">
    <video id="starshipVideo" playsinline webkit-playsinline preload="auto"></video>
  </div>

  <div id="videoStartOverlay">
    <button id="btnStartVideo">▶ Video starten (Ton)</button>
  </div>

<script>
  const canvas = document.getElementById("timer");
  const ctx = canvas.getContext("2d");
  canvas.width = 800; canvas.height = 800;

  let totalTime = 60 * 60;
  let remaining = 45 * 60;
  let running = false;

  // Version A Zeitautomatik
  const AUTO_START_H = 7, AUTO_START_M = 15;
  const AUTO_ZERO_H  = 8, AUTO_ZERO_M  = 0;
  const MORNING_MINUTES = 45;
  let lastAutoStartKey = null;
  let lastAutoZeroKey = null;

  function todayKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const da = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${da}`;
  }

  // Passwortschutz
  const PASSWORD = "strunk";
  let unlockedUntil = 0;
  const UNLOCK_MS = 2 * 60 * 1000;
  const lockStateEl = document.getElementById("lockState");
  const btnLock = document.getElementById("btnLock");

  function isUnlocked(){ return Date.now() < unlockedUntil; }
  function updateLockUI(){
    if (isUnlocked()){
      const secs = Math.max(0, Math.ceil((unlockedUntil-Date.now())/1000));
      lockStateEl.textContent = `entsperrt (${secs}s)`;
      btnLock.textContent = "🔓";
    } else {
      lockStateEl.textContent = "gesperrt";
      btnLock.textContent = "🔒";
    }
  }
  function requireUnlock(){
    if (isUnlocked()) return true;
    const entered = window.prompt("Passwort eingeben:");
    if (entered === null) return false;
    if (entered === PASSWORD){
      unlockedUntil = Date.now() + UNLOCK_MS;
      updateLockUI();
      return true;
    }
    alert("Falsches Passwort.");
    return false;
  }
  btnLock.addEventListener("click", () => {
    if (isUnlocked()){ unlockedUntil = 0; updateLockUI(); }
    else { requireUnlock(); }
  });

  // Farben >45 blau, >30 grün, >15 gelb, <=15 rot
  function getColor(secondsLeft){
    if (secondsLeft > 45*60) return "#1a73e8";
    if (secondsLeft > 30*60) return "#3cb371";
    if (secondsLeft > 15*60) return "#e6b800";
    return "#d64545";
  }

  // Video-Setup
  const videoOverlay = document.getElementById("videoOverlay");
  const starshipVideo = document.getElementById("starshipVideo");
  const videoStartOverlay = document.getElementById("videoStartOverlay");
  const btnStartVideo = document.getElementById("btnStartVideo");

  // ⚠️ Pfad exakt! Wenn in Unterordner: "videos/Starship%203.mp4"
  const VIDEO_SRC = "Starship%203.mp4";

  let videoStarted = false;

  function resetVideoState(){
    videoStarted = false;
    videoOverlay.style.display = "none";
    videoStartOverlay.style.display = "none";
    try { starshipVideo.pause(); } catch(e){}
    // src lassen wir drin, damit geladen bleiben kann

    canvas.classList.remove("hidden");
    document.getElementById("topTime").classList.remove("hidden");
    document.getElementById("controls").classList.remove("hidden");
  }

  // === Audio Unlock (WebAudio) + Merken ===
  const AUDIO_KEY = "wandTimer_audioPrimed_v2";
  let audioPrimed = (localStorage.getItem(AUDIO_KEY) === "1");

  const audioPrimeOverlay = document.getElementById("audioPrimeOverlay");
  const btnPrimeAudio = document.getElementById("btnPrimeAudio");
  const primeStatus = document.getElementById("primeStatus");

  let audioCtx = null;

  async function primeAudioWebAudio(){
    primeStatus.textContent = "Aktiviere Audio…";
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) {
        primeStatus.textContent = "WebAudio nicht verfügbar. Video muss später per Tippen gestartet werden.";
        return;
      }

      if (!audioCtx) audioCtx = new AC();

      // iOS 12: resume() im User-Gesture
      if (audioCtx.state === "suspended" && audioCtx.resume) {
        await audioCtx.resume();
      }

      // kurzer stummer Impuls (Gain 0) zum Unlock
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      gain.gain.value = 0.0;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);

      // Merken + Overlay weg
      localStorage.setItem(AUDIO_KEY, "1");
      audioPrimed = true;
      audioPrimeOverlay.style.display = "none";
      primeStatus.textContent = "";

      // Optional: Video schon mal setzen, damit es ready ist
      if (!starshipVideo.src) starshipVideo.src = VIDEO_SRC;

    } catch (e) {
      // Kein Alert-Loop mehr – Status anzeigen
      primeStatus.textContent = "Audio konnte nicht aktiviert werden. Bitte nochmal tippen.";
    }
  }

  function showPrimeOverlayIfNeeded(){
    audioPrimeOverlay.style.display = audioPrimed ? "none" : "flex";
    primeStatus.textContent = "";
  }

  btnPrimeAudio.addEventListener("click", () => {
    primeAudioWebAudio();
  });

  // Video bei 10 Sekunden Rest
  function hideTimerShowVideo(){
    if (videoStarted) return;
    videoStarted = true;

    document.getElementById("topTime").classList.add("hidden");
    document.getElementById("controls").classList.add("hidden");
    canvas.classList.add("hidden");

    videoOverlay.style.display = "block";
    videoStartOverlay.style.display = "none";

    starshipVideo.src = VIDEO_SRC;
    starshipVideo.currentTime = 0;
    starshipVideo.muted = false;
    starshipVideo.volume = 1.0;

    const p = starshipVideo.play();
    if (p && typeof p.catch === "function"){
      p.catch(() => {
        // Wenn iOS trotzdem blockt: großer Tap-Start
        videoStartOverlay.style.display = "flex";
      });
    }
  }

  btnStartVideo.addEventListener("click", () => {
    videoStartOverlay.style.display = "none";
    starshipVideo.muted = false;
    starshipVideo.volume = 1.0;
    starshipVideo.play();
  });

  starshipVideo.addEventListener("ended", () => {
    videoOverlay.style.display = "none";
    videoStartOverlay.style.display = "none";
    canvas.classList.remove("hidden");
    document.getElementById("topTime").classList.remove("hidden");
    document.getElementById("controls").classList.remove("hidden");
  });

  function applyDailyAutomation(now = new Date()){
    const key = todayKey(now);
    const h = now.getHours();
    const m = now.getMinutes();

    if (h === AUTO_START_H && m === AUTO_START_M && lastAutoStartKey !== key){
      resetVideoState();
      remaining = MORNING_MINUTES * 60;
      document.getElementById("minutesInput").value = String(MORNING_MINUTES);
      running = true;
      lastAutoStartKey = key;
    }

    if (h === AUTO_ZERO_H && m === AUTO_ZERO_M && lastAutoZeroKey !== key){
      resetVideoState();
      remaining = 0;
      running = false;
      lastAutoZeroKey = key;
    }
  }

  // Zeichnen
  function drawClockFace(){
    ctx.beginPath();
    ctx.arc(400,400,360,0,2*Math.PI);
    ctx.fillStyle="#f7f8fa"; ctx.fill();
    ctx.lineWidth=8;
    ctx.strokeStyle="rgba(0,0,0,0.18)";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(400,400,340,0,2*Math.PI);
    ctx.fillStyle="#ffffff"; ctx.fill();

    drawMinuteLabel(45); drawMinuteLabel(30); drawMinuteLabel(15);
  }
  function drawMinuteLabel(minute){
    const angle = (minute/60)*2*Math.PI - Math.PI/2;
    const radius = 305;
    const x = 400 + radius*Math.cos(angle);
    const y = 400 + radius*Math.sin(angle);
    ctx.fillStyle="rgba(0,0,0,0.45)";
    ctx.font="40px Arial";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(minute, x, y);
  }
  function drawTimerArc(){
    const progress = remaining/totalTime;
    const angle = progress*2*Math.PI;
    ctx.beginPath();
    ctx.moveTo(400,400);
    ctx.arc(400,400,335,-Math.PI/2, angle - Math.PI/2, false);
    ctx.fillStyle=getColor(remaining);
    ctx.globalAlpha=0.92; ctx.fill(); ctx.globalAlpha=1;
  }
  function formatMMSS(sec){
    const mm = Math.floor(sec/60);
    const ss = sec%60;
    return `${mm}:${String(ss).padStart(2,"0")}`;
  }
  function drawRemaining(){
    ctx.fillStyle="rgba(0,0,0,0.78)";
    ctx.font="bold 86px Arial";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(formatMMSS(remaining), 400, 410);
  }
  function draw(){
    if (!canvas.classList.contains("hidden")){
      ctx.clearRect(0,0,800,800);
      drawClockFace();
      drawTimerArc();
      drawRemaining();
    }
    requestAnimationFrame(draw);
  }

  // Tick
  function tick(){
    applyDailyAutomation(new Date());

    if (running && remaining > 0){
      remaining--;

      if (remaining === 10){
        hideTimerShowVideo();
      }
      if (remaining === 0) running = false;
    }
  }

  // Bedienung (entsperrt)
  const minutesInput = document.getElementById("minutesInput");
  let lastMinutesValue = minutesInput.value;

  function toggleTimer(){ running = !running; }
  function setTimer(){
    let minutes = Number(minutesInput.value);
    if (!Number.isFinite(minutes)) minutes = 45;
    minutes = Math.max(1, Math.min(60, minutes));
    minutesInput.value = String(minutes);

    resetVideoState();
    remaining = minutes * 60;
  }

  document.getElementById("btnSet").addEventListener("click", () => {
    if (!requireUnlock()) return;
    setTimer();
  });
  document.getElementById("btnToggle").addEventListener("click", () => {
    if (!requireUnlock()) return;
    toggleTimer();
  });

  minutesInput.addEventListener("focus", () => {
    lastMinutesValue = minutesInput.value;
    if (!requireUnlock()){
      setTimeout(() => {
        minutesInput.value = lastMinutesValue;
        minutesInput.blur();
      }, 0);
    }
  });
  minutesInput.addEventListener("change", () => {
    if (!isUnlocked()) minutesInput.value = lastMinutesValue;
    else lastMinutesValue = minutesInput.value;
  });

  // Uhrzeit
  const topTimeEl = document.getElementById("topTime");
  function updateTopTime(){
    const now = new Date();
    topTimeEl.textContent =
      String(now.getHours()).padStart(2,"0") + ":" +
      String(now.getMinutes()).padStart(2,"0");
  }

  setInterval(tick, 1000);
  setInterval(updateTopTime, 1000);
  setInterval(updateLockUI, 250);

  updateTopTime();
  updateLockUI();
  applyDailyAutomation(new Date());
  draw();

  // Prime Overlay anzeigen falls nötig
  showPrimeOverlayIfNeeded();
</script>
</body>
</html>
