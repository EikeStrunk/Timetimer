<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- iOS "Web-App"-Modus (Adresszeile weg, wenn neu zum Homescreen hinzugefügt) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wand-Timer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #f3f5f8 0%, #dde3ea 55%, #cfd6df 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #topTime {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 44px;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 16px;
    border-radius: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  canvas {
    width: 85vmin;
    height: 85vmin;
    filter: drop-shadow(0 10px 35px rgba(0,0,0,0.18));
  }

  #controls {
    position: absolute;
    bottom: 18px;
    right: 18px;
    display: flex;
    gap: 10px;
    align-items: center;

    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,0,0,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 10px 12px;
    border-radius: 14px;

    opacity: 0.35;
    transition: opacity 180ms ease, transform 180ms ease;
    user-select: none;
    touch-action: manipulation;
  }

  #controls:hover,
  #controls:focus-within {
    opacity: 0.95;
    transform: translateY(-2px);
  }

  #controls .label {
    font-size: 14px;
    color: rgba(0,0,0,0.65);
    margin-right: 2px;
  }

  #controls input,
  #controls button {
    font-size: 16px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.75);
    color: rgba(0,0,0,0.85);
    outline: none;
  }

  #controls button { cursor: pointer; }
  #controls button:active { transform: translateY(1px); }

  .lockedHint {
    font-size: 14px;
    color: rgba(0,0,0,0.55);
    padding-left: 2px;
  }
</style>
</head>

<body>
  <div id="topTime">--:--</div>
  <canvas id="timer"></canvas>

  <div id="controls" aria-label="Timer-Steuerung">
    <span class="label">Min:</span>
    <input type="number" id="minutesInput" value="45" min="1" max="60" />
    <button id="btnSet">Setzen</button>
    <button id="btnToggle">Start / Pause</button>

    <!-- iOS braucht oft einen Tap, damit Speech später klappt -->
    <button id="btnAudio" title="Einmal tippen, damit die Sprachausgabe später klappt">🔊 Audio</button>

    <button id="btnLock">🔒</button>
    <span id="lockState" class="lockedHint">gesperrt</span>
  </div>

<script>
  const canvas = document.getElementById("timer");
  const ctx = canvas.getContext("2d");

  canvas.width = 800;
  canvas.height = 800;

  // Ring-Skala 60 Minuten
  let totalTime = 60 * 60;
  let remaining = 45 * 60;
  let running = false;

  // ---- Tages-Automatik (Version A) ----
  const AUTO_START_H = 7, AUTO_START_M = 15;  // Start
  const AUTO_ZERO_H  = 8, AUTO_ZERO_M  = 0;   // auf 0
  const MORNING_MINUTES = 45;

  let lastAutoStartKey = null;
  let lastAutoZeroKey = null;

  function todayKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const da = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${da}`;
  }

  function cancelCountdownAndLaunch() {
    countdownActive = false;
    lastSpokenCountdown = null;
    launchActive = false;
    launchStartMs = 0;
    try { if (window.speechSynthesis) window.speechSynthesis.cancel(); } catch(e){}
  }

  function applyDailyAutomation(now = new Date()) {
    const key = todayKey(now);
    const h = now.getHours();
    const m = now.getMinutes();

    // 07:15 -> auf 45 Minuten setzen UND starten
    if (h === AUTO_START_H && m === AUTO_START_M && lastAutoStartKey !== key) {
      cancelCountdownAndLaunch();
      remaining = MORNING_MINUTES * 60;
      document.getElementById("minutesInput").value = String(MORNING_MINUTES);
      running = true;
      lastAutoStartKey = key;
    }

    // 08:00 -> auf 0 und stoppen (kein Raketenstart, weil nicht "runtergelaufen")
    if (h === AUTO_ZERO_H && m === AUTO_ZERO_M && lastAutoZeroKey !== key) {
      cancelCountdownAndLaunch();
      remaining = 0;
      running = false;
      lastAutoZeroKey = key;
    }
  }

  // ---- Passwort-Sperre (Version A) ----
  const PASSWORD = "strunk";
  let unlockedUntil = 0;             // ms timestamp
  const UNLOCK_MS = 2 * 60 * 1000;   // 2 Minuten entsperrt

  const lockStateEl = document.getElementById("lockState");
  const btnLock = document.getElementById("btnLock");

  function isUnlocked() {
    return Date.now() < unlockedUntil;
  }

  function updateLockUI() {
    if (isUnlocked()) {
      const secs = Math.max(0, Math.ceil((unlockedUntil - Date.now()) / 1000));
      lockStateEl.textContent = `entsperrt (${secs}s)`;
      btnLock.textContent = "🔓";
    } else {
      lockStateEl.textContent = "gesperrt";
      btnLock.textContent = "🔒";
    }
  }

  function requireUnlock() {
    if (isUnlocked()) return true;

    const entered = window.prompt("Passwort eingeben:");
    if (entered === null) return false;

    if (entered === PASSWORD) {
      unlockedUntil = Date.now() + UNLOCK_MS;
      updateLockUI();
      return true;
    }

    alert("Falsches Passwort.");
    return false;
  }

  btnLock.addEventListener("click", () => {
    if (isUnlocked()) {
      unlockedUntil = 0;
      updateLockUI();
    } else {
      requireUnlock();
    }
  });

  // ---- Audio / Sprachausgabe (iOS braucht meist "User Gesture") ----
  let audioPrimed = false;

  function primeAudio() {
    try {
      if (!("speechSynthesis" in window)) {
        alert("Sprachausgabe wird hier nicht unterstützt.");
        return;
      }
      const u = new SpeechSynthesisUtterance("Audio aktiviert");
      u.rate = 1.0;
      u.pitch = 1.0;
      u.volume = 0.7;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
      audioPrimed = true;
    } catch (e) {
      audioPrimed = false;
    }
  }

  document.getElementById("btnAudio").addEventListener("click", () => {
    primeAudio();
  });

  function speak(text) {
    if (!audioPrimed) return;
    try {
      const u = new SpeechSynthesisUtterance(String(text));
      u.rate = 1.0;
      u.pitch = 1.0;
      u.volume = 0.95;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  // ---- Farben: 60->blau, 45->grün, 30->gelb, 15->rot (analog nach Bereichen) ----
  function getColor(secondsLeft) {
    if (secondsLeft > 45 * 60) return "#1a73e8";  // blau (46-60)
    if (secondsLeft > 30 * 60) return "#3cb371";  // grün (31-45)
    if (secondsLeft > 15 * 60) return "#e6b800";  // gelb (16-30)
    return "#d64545";                              // rot (0-15)
  }

  // ---- Countdown + Rakete ----
  let countdownActive = false;
  let lastSpokenCountdown = null;

  let launchActive = false;
  let launchStartMs = 0;

  function startLaunch() {
    launchActive = true;
    launchStartMs = Date.now();
  }

  // ---- Zeichnen ----
  function drawClockFace() {
    // Außenkreis
    ctx.beginPath();
    ctx.arc(400, 400, 360, 0, 2 * Math.PI);
    ctx.fillStyle = "#f7f8fa";
    ctx.fill();
    ctx.lineWidth = 8;
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.stroke();

    // Innenfläche
    ctx.beginPath();
    ctx.arc(400, 400, 340, 0, 2 * Math.PI);
    ctx.fillStyle = "#ffffff";
    ctx.fill();

    drawMinuteLabel(45);
    drawMinuteLabel(30);
    drawMinuteLabel(15);
  }

  function drawMinuteLabel(minute) {
    const angle = (minute / 60) * 2 * Math.PI - 0.5 * Math.PI;
    const radius = 305;
    const x = 400 + radius * Math.cos(angle);
    const y = 400 + radius * Math.sin(angle);

    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(minute, x, y);
  }

  function drawTimerArc() {
    const progress = remaining / totalTime;
    const angle = progress * 2 * Math.PI;

    ctx.beginPath();
    ctx.moveTo(400, 400);
    ctx.arc(400, 400, 335, -Math.PI/2, angle - Math.PI/2, false);
    ctx.fillStyle = getColor(remaining);
    ctx.globalAlpha = 0.92;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function formatMMSS(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function drawRemaining() {
    ctx.fillStyle = "rgba(0,0,0,0.78)";
    ctx.font = "bold 86px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(formatMMSS(remaining), 400, 410);
  }

  function drawCountdownOverlay() {
    if (!countdownActive) return;

    const n = Math.max(0, Math.min(10, remaining));

    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.beginPath();
    ctx.arc(400, 400, 165, 0, 2 * Math.PI);
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.font = "bold 120px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(n), 400, 400);
    ctx.restore();
  }

  // Sternen-Hintergrund (deterministisch, keine Zufallsflackerei)
  function drawStarsInCircle(alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    // Clip auf Innenkreis
    ctx.beginPath();
    ctx.arc(400, 400, 340, 0, 2 * Math.PI);
    ctx.clip();

    // Nachtblaues Overlay
    ctx.fillStyle = "#0b1a3a";
    ctx.globalAlpha = alpha * 0.65;
    ctx.beginPath();
    ctx.arc(400, 400, 340, 0, 2 * Math.PI);
    ctx.fill();

    // Sterne (fixe Positionen)
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    const stars = [
      [260,240,2],[520,230,1.6],[430,210,1.2],[320,310,1.4],[560,330,2.2],
      [240,420,1.1],[600,430,1.6],[490,520,1.4],[310,540,2.0],[410,600,1.3],
      [370,260,1.2],[610,300,1.1],[210,320,1.0],[590,560,1.2],[260,610,1.0],
    ];
    for (const [x,y,r] of stars) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, 2*Math.PI);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawRocketLaunch() {
    if (!launchActive) return;

    // ca. 5 Sekunden, mit etwas "Nachglühen"
    const dur = 5200;
    const t = (Date.now() - launchStartMs) / dur;
    if (t >= 1) {
      launchActive = false;
      return;
    }

    // Screen-shake (leicht) in der Startphase
    let shakeX = 0, shakeY = 0;
    if (t < 0.45) {
      const s = (1 - t / 0.45); // 1..0
      shakeX = (Math.sin(Date.now() / 45) * 2.2) * s;
      shakeY = (Math.cos(Date.now() / 55) * 2.0) * s;
    }

    // Sternenhimmel/Overlay
    drawStarsInCircle(0.85);

    // Raketen-Position: von unten nach oben raus
    const startY = 700;
    const endY = -140;
    const y = startY + (endY - startY) * t;
    const x = 400;

    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Rauchspur (hinter der Rakete)
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    for (let i = 0; i < 18; i++) {
      const p = i / 18;
      const sy = y + 120 + p * 300; // unterhalb
      const sx = x + Math.sin((Date.now()/120) + i) * (6 + 10*p);
      const r = 10 + 22*p;
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, 2*Math.PI);
      ctx.fill();
    }
    ctx.restore();

    // Flamme (wechselnd)
    const flamePhase = Math.floor(Date.now() / 90) % 2;

    ctx.save();
    ctx.translate(x, y);

    // Flamme
    ctx.beginPath();
    ctx.moveTo(0, 62);
    ctx.quadraticCurveTo(-18, 98, 0, 132);
    ctx.quadraticCurveTo(18, 98, 0, 62);
    ctx.closePath();
    ctx.fillStyle = flamePhase === 0 ? "#ffb300" : "#ff7043";
    ctx.globalAlpha = 0.95;
    ctx.fill();

    // Raketen-Körper
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#ffffff";
    ctx.strokeStyle = "rgba(0,0,0,0.22)";
    ctx.lineWidth = 3;

    // Körper
    ctx.beginPath();
    ctx.roundRect(-26, -10, 52, 112, 24);
    ctx.fill();
    ctx.stroke();

    // Spitze
    ctx.beginPath();
    ctx.moveTo(0, -56);
    ctx.quadraticCurveTo(33, -24, 26, -10);
    ctx.lineTo(-26, -10);
    ctx.quadraticCurveTo(-33, -24, 0, -56);
    ctx.closePath();
    ctx.fillStyle = "#e8eef6";
    ctx.fill();
    ctx.stroke();

    // Fenster
    ctx.beginPath();
    ctx.arc(0, 30, 12, 0, 2 * Math.PI);
    ctx.fillStyle = "#1a73e8";
    ctx.fill();
    ctx.stroke();

    // Flossen
    ctx.beginPath();
    ctx.moveTo(-26, 70);
    ctx.lineTo(-54, 96);
    ctx.lineTo(-26, 96);
    ctx.closePath();
    ctx.fillStyle = "#e8eef6";
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(26, 70);
    ctx.lineTo(54, 96);
    ctx.lineTo(26, 96);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Glühen im Startmoment
    if (t < 0.2) {
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(0, 90, 70, 0, 2*Math.PI);
      ctx.fill();
      ctx.restore();
    }

    ctx.restore(); // translate rocket
    ctx.restore(); // translate shake

    // kleiner "Abgas-Fog" im unteren Bereich (im Kreis)
    if (t < 0.6) {
      ctx.save();
      ctx.globalAlpha = 0.18 * (1 - t/0.6);
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.beginPath();
      ctx.arc(400, 565, 120, 0, 2*Math.PI);
      ctx.fill();
      ctx.restore();
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawClockFace();
    drawTimerArc();
    drawRemaining();
    drawCountdownOverlay();
    drawRocketLaunch();
    requestAnimationFrame(draw);
  }

  // ---- Tick: Countdown sprechen + Launch nur bei echtem Runterlaufen ----
  function tick() {
    applyDailyAutomation(new Date());

    if (running && remaining > 0) {
      // Countdown-Phase aktivieren, wenn wir in die letzten 10 Sekunden kommen
      if (remaining <= 10) {
        countdownActive = true;

        // Genau einmal pro Sekunde sprechen: 10..0
        if (lastSpokenCountdown !== remaining) {
          speak(remaining);
          lastSpokenCountdown = remaining;
        }
      } else {
        countdownActive = false;
        lastSpokenCountdown = null;
      }

      // runterzählen
      remaining--;

      // bei Übergang auf 0: Rakete starten (nur echtes Ablaufen)
      if (remaining === 0) {
        running = false;

        // optional noch "0" sagen
        if (audioPrimed && lastSpokenCountdown !== 0) {
          speak(0);
          lastSpokenCountdown = 0;
        }

        countdownActive = false;
        startLaunch();
      }
    }
  }

  // ---- Bedienung nur entsperrt ----
  const minutesInput = document.getElementById("minutesInput");
  let lastMinutesValue = minutesInput.value;

  function toggleTimer() { running = !running; }

  function setTimer() {
    let minutes = Number(minutesInput.value);
    if (!Number.isFinite(minutes)) minutes = 45;
    minutes = Math.max(1, Math.min(60, minutes));
    minutesInput.value = String(minutes);

    cancelCountdownAndLaunch();
    remaining = minutes * 60;
  }

  document.getElementById("btnSet").addEventListener("click", () => {
    if (!requireUnlock()) return;
    setTimer();
  });

  document.getElementById("btnToggle").addEventListener("click", () => {
    if (!requireUnlock()) return;
    toggleTimer();
  });

  // Minutenfeld schützen
  minutesInput.addEventListener("focus", () => {
    lastMinutesValue = minutesInput.value;
    if (!requireUnlock()) {
      setTimeout(() => {
        minutesInput.value = lastMinutesValue;
        minutesInput.blur();
      }, 0);
    }
  });

  minutesInput.addEventListener("change", () => {
    if (!isUnlocked()) {
      minutesInput.value = lastMinutesValue;
    } else {
      lastMinutesValue = minutesInput.value;
    }
  });

  // ---- Uhrzeit oben ----
  const topTimeEl = document.getElementById("topTime");
  function formatHHMM(date) {
    const hh = String(date.getHours()).padStart(2, "0");
    const mm = String(date.getMinutes()).padStart(2, "0");
    return `${hh}:${mm}`;
  }
  function updateTopTime() {
    topTimeEl.textContent = formatHHMM(new Date());
  }

  // Start
  setInterval(tick, 1000);
  setInterval(updateTopTime, 1000);
  setInterval(updateLockUI, 250);

  updateTopTime();
  updateLockUI();
  applyDailyAutomation(new Date());
  draw();
</script>

</body>
</html>
