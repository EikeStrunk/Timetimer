<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wand-Timer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #f3f5f8 0%, #dde3ea 55%, #cfd6df 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #topTime {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 44px;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 16px;
    border-radius: 14px;
  }

  canvas#timer {
    width: 85vmin;
    height: 85vmin;
    filter: drop-shadow(0 10px 35px rgba(0,0,0,0.18));
  }

  #controls {
    position: absolute;
    bottom: 18px;
    right: 18px;
    display: flex;
    gap: 10px;
    align-items: center;

    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 12px;
    border-radius: 14px;

    opacity: 0.45;
    transition: opacity 0.2s, transform 0.2s;
    user-select: none;
    touch-action: manipulation;
  }

  #controls:hover { opacity: 0.95; transform: translateY(-2px); }

  #controls input, #controls button {
    font-size: 16px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.75);
    color: rgba(0,0,0,0.85);
    outline: none;
    cursor: pointer;
  }

  #controls .label { font-size: 14px; color: rgba(0,0,0,0.65); }

  /* Film overlay */
  #rocketOverlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 70%, #0b1020 0%, #060812 60%, #000 100%);
    display: none;
    z-index: 9999;
  }

  #rocketCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Cinematic HUD (Countdown only) */
  #cinematicHud {
    position: fixed;
    inset: 0;
    z-index: 10000;
    display: none;
    pointer-events: none;
    align-items: center;
    justify-content: center;
  }
  #cinematicHud .count {
    font-size: min(20vh, 160px);
    font-weight: 900;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 10px 40px rgba(0,0,0,0.6);
    padding: 18px 26px;
    border-radius: 22px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .hidden { display: none !important; }
</style>
</head>

<body>

<div id="topTime"></div>
<canvas id="timer"></canvas>

<div id="controls">
  <span class="label">Min:</span>
  <input type="number" id="minutesInput" value="45" min="0" max="60">
  <span class="label">Sek:</span>
  <input type="number" id="secondsInput" value="0" min="0" max="59">
  <button id="btn15">15s</button>
  <button id="btnSet">Setzen</button>
  <button id="btnToggle">Start / Pause</button>
</div>

<div id="rocketOverlay">
  <canvas id="rocketCanvas"></canvas>
</div>

<div id="cinematicHud">
  <div class="count" id="countText">10</div>
</div>

<script>
/* =========================
   Timer (Uhr)
========================= */
const canvas = document.getElementById("timer");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 800;

let totalTime = 60 * 60;     // 60min Skala
let remaining = 45 * 60;
let running = false;

// Countdown speech sync
let lastSpoken = null;

// Version A Zeitautomatik
const AUTO_START_H = 7, AUTO_START_M = 15;
const AUTO_ZERO_H  = 8, AUTO_ZERO_M  = 0;
const MORNING_MINUTES = 45;
let lastAutoStartKey = null;
let lastAutoZeroKey = null;

function todayKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function applyDailyAutomation(now = new Date()) {
  const key = todayKey(now);
  const h = now.getHours();
  const m = now.getMinutes();

  // 07:15 -> 45min + Start
  if (h === AUTO_START_H && m === AUTO_START_M && lastAutoStartKey !== key) {
    stopRocketShow(); // falls Film noch offen
    remaining = MORNING_MINUTES * 60;
    minutesInput.value = String(MORNING_MINUTES);
    secondsInput.value = "0";
    running = true;
    lastAutoStartKey = key;
  }

  // 08:00 -> 0 + Stop
  if (h === AUTO_ZERO_H && m === AUTO_ZERO_M && lastAutoZeroKey !== key) {
    stopRocketShow();
    remaining = 0;
    running = false;
    lastAutoZeroKey = key;
  }
}

function getColor(secondsLeft) {
  if (secondsLeft > 45 * 60) return "#1a73e8";  // blau
  if (secondsLeft > 30 * 60) return "#3cb371";  // grün
  if (secondsLeft > 15 * 60) return "#e6b800";  // gelb
  return "#d64545";                             // rot
}

function drawClockFace() {
  ctx.beginPath();
  ctx.arc(400, 400, 360, 0, 2*Math.PI);
  ctx.fillStyle = "#f7f8fa";
  ctx.fill();
  ctx.lineWidth = 8;
  ctx.strokeStyle = "rgba(0,0,0,0.18)";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(400, 400, 340, 0, 2*Math.PI);
  ctx.fillStyle = "#ffffff";
  ctx.fill();

  drawMinuteLabel(45);
  drawMinuteLabel(30);
  drawMinuteLabel(15);
}

function drawMinuteLabel(minute) {
  const angle = (minute / 60) * 2*Math.PI - Math.PI/2;
  const radius = 305;
  const x = 400 + radius * Math.cos(angle);
  const y = 400 + radius * Math.sin(angle);

  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(minute, x, y);
}

function drawTimerArc() {
  const progress = remaining / totalTime;
  const angle = progress * 2*Math.PI;

  ctx.beginPath();
  ctx.moveTo(400, 400);
  ctx.arc(400, 400, 335, -Math.PI/2, angle - Math.PI/2, false);
  ctx.fillStyle = getColor(remaining);
  ctx.globalAlpha = 0.92;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function formatMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

function drawRemaining() {
  ctx.fillStyle = "rgba(0,0,0,0.78)";
  ctx.font = "bold 86px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(formatMMSS(remaining), 400, 410);
}

function draw() {
  if (!canvas.classList.contains("hidden")) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawClockFace();
    drawTimerArc();
    drawRemaining();
  }
  requestAnimationFrame(draw);
}

/* =========================
   Sound + Speech (synced)
========================= */
let audioCtx = null;
let engineNodes = null;

function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === "suspended" && audioCtx.resume) {
    audioCtx.resume();
  }
}

function beep(freq=880, ms=110, gain=0.06) {
  ensureAudio();
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.frequency.value = freq;
  g.gain.value = gain;

  osc.connect(g);
  g.connect(audioCtx.destination);

  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms/1000);

  osc.start(t0);
  osc.stop(t0 + ms/1000);
}

function rumble(ms=1400) {
  ensureAudio();
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const duration = ms/1000;

  const bufferSize = Math.floor(audioCtx.sampleRate * duration);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2 - 1) * 0.9;

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 160;

  const g = audioCtx.createGain();
  g.gain.value = 0.001;

  noise.connect(filter);
  filter.connect(g);
  g.connect(audioCtx.destination);

  g.gain.setValueAtTime(0.001, t0);
  g.gain.linearRampToValueAtTime(0.12, t0 + 0.15);
  g.gain.linearRampToValueAtTime(0.03, t0 + duration);

  noise.start(t0);
  noise.stop(t0 + duration);
}

function whoosh(ms=900) {
  ensureAudio();
  if (!audioCtx) return;

  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(240, t0);
  osc.frequency.exponentialRampToValueAtTime(60, t0 + ms/1000);

  g.gain.setValueAtTime(0.001, t0);
  g.gain.linearRampToValueAtTime(0.07, t0 + 0.10);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms/1000);

  osc.connect(g);
  g.connect(audioCtx.destination);

  osc.start(t0);
  osc.stop(t0 + ms/1000);
}

function startEngineHum() {
  ensureAudio();
  if (!audioCtx || engineNodes) return;

  // noise + lowpass + subtle tone
  const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * 0.6;

  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuf;
  noise.loop = true;

  const lp = audioCtx.createBiquadFilter();
  lp.type = "lowpass";
  lp.frequency.value = 220;

  const tone = audioCtx.createOscillator();
  tone.type = "sine";
  tone.frequency.value = 62;

  const g = audioCtx.createGain();
  g.gain.value = 0.0001;

  noise.connect(lp);
  lp.connect(g);
  tone.connect(g);
  g.connect(audioCtx.destination);

  const t0 = audioCtx.currentTime;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(0.018, t0 + 0.8);

  noise.start();
  tone.start();

  engineNodes = { noise, tone, g };
}

function stopEngineHum() {
  if (!audioCtx || !engineNodes) return;
  const t0 = audioCtx.currentTime;
  try {
    engineNodes.g.gain.cancelScheduledValues(t0);
    engineNodes.g.gain.setValueAtTime(engineNodes.g.gain.value, t0);
    engineNodes.g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.6);
  } catch(e) {}

  setTimeout(() => {
    try { engineNodes.noise.stop(); } catch(e) {}
    try { engineNodes.tone.stop(); } catch(e) {}
    engineNodes = null;
  }, 700);
}

function speakNumber(n) {
  if (!("speechSynthesis" in window)) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(n));
    u.lang = "de-DE";
    u.rate = 1.02;
    u.pitch = 1.0;
    u.volume = 1.0;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

/* =========================
   Cinematic Rocket Film (60s)
========================= */
const rocketOverlay = document.getElementById("rocketOverlay");
const rocketCanvas = document.getElementById("rocketCanvas");
const rctx = rocketCanvas.getContext("2d");

const cinematicHud = document.getElementById("cinematicHud");
const countText = document.getElementById("countText");

let rocketRAF = null;
let rocketRunning = false;
let filmStart = 0;

let starsFar = [];
let starsMid = [];
let starsNear = [];
let smoke = [];
let sparks = [];

function resizeRocketCanvas() {
  rocketCanvas.width = Math.floor(window.innerWidth * devicePixelRatio);
  rocketCanvas.height = Math.floor(window.innerHeight * devicePixelRatio);
}
window.addEventListener("resize", () => {
  if (rocketRunning) {
    resizeRocketCanvas();
    initStarfields();
  }
});

function initStarfields() {
  const w = rocketCanvas.width;
  const h = rocketCanvas.height;

  function makeStars(count, sizeMin, sizeMax, alphaMin, alphaMax) {
    const arr = [];
    for (let i=0; i<count; i++) {
      arr.push({
        x: Math.random()*w,
        y: Math.random()*h,
        r: (Math.random()*(sizeMax-sizeMin)+sizeMin)*devicePixelRatio,
        a: Math.random()*(alphaMax-alphaMin)+alphaMin,
        tw: Math.random()*1.4+0.2
      });
    }
    return arr;
  }

  starsFar  = makeStars(Math.floor((w*h)/90000), 0.35, 0.9, 0.10, 0.40);
  starsMid  = makeStars(Math.floor((w*h)/140000), 0.7,  1.6, 0.20, 0.60);
  starsNear = makeStars(Math.floor((w*h)/220000), 1.1,  2.4, 0.25, 0.80);

  smoke = [];
  sparks = [];
}

function spawnSmoke(x,y,intensity=1) {
  const n = Math.floor(10 * intensity);
  for (let i=0; i<n; i++) {
    smoke.push({
      x, y,
      vx: (Math.random()*2-1) * (2.2*devicePixelRatio) * intensity,
      vy: (Math.random()*1.2 + 2.4) * devicePixelRatio,
      r: (Math.random()*18 + 14) * devicePixelRatio * (0.9 + 0.4*intensity),
      a: 0.50,
      life: Math.random()*70 + 60
    });
  }
}

function spawnSparks(x,y,amount=10) {
  for (let i=0; i<amount; i++) {
    sparks.push({
      x, y,
      vx: (Math.random()*2-1) * 5.5 * devicePixelRatio,
      vy: (Math.random()*-1.5 - 3.0) * devicePixelRatio,
      a: 0.9,
      life: Math.random()*25 + 20
    });
  }
}

function drawNebula(t, w, h) {
  // soft moving fog layers
  const g1 = rctx.createRadialGradient(w*0.25, h*0.35, 0, w*0.25, h*0.35, w*0.65);
  g1.addColorStop(0, `rgba(120,80,255,${0.08 + 0.02*Math.sin(t*0.3)})`);
  g1.addColorStop(1, "rgba(0,0,0,0)");
  rctx.fillStyle = g1;
  rctx.fillRect(0,0,w,h);

  const g2 = rctx.createRadialGradient(w*0.75, h*0.55, 0, w*0.75, h*0.55, w*0.7);
  g2.addColorStop(0, `rgba(40,200,255,${0.06 + 0.02*Math.sin(t*0.22+1.2)})`);
  g2.addColorStop(1, "rgba(0,0,0,0)");
  rctx.fillStyle = g2;
  rctx.fillRect(0,0,w,h);
}

function drawPlanet(t,w,h) {
  // far planet drifting slowly
  const px = w*0.82 + Math.sin(t*0.04)*w*0.02;
  const py = h*0.74 + Math.cos(t*0.03)*h*0.02;
  const pr = Math.min(w,h)*0.22;

  // shadow
  rctx.beginPath();
  rctx.arc(px,py,pr,0,Math.PI*2);
  const pg = rctx.createRadialGradient(px-pr*0.25, py-pr*0.15, pr*0.2, px, py, pr);
  pg.addColorStop(0, "rgba(160,190,255,0.20)");
  pg.addColorStop(0.55, "rgba(40,60,120,0.12)");
  pg.addColorStop(1, "rgba(0,0,0,0.0)");
  rctx.fillStyle = pg;
  rctx.fill();

  // rim light
  rctx.beginPath();
  rctx.arc(px,py,pr*1.02,0,Math.PI*2);
  rctx.strokeStyle = "rgba(160,190,255,0.12)";
  rctx.lineWidth = 3*devicePixelRatio;
  rctx.stroke();
}

function drawStars(arr, t, dx, dy) {
  for (const st of arr) {
    const tw = 0.55 + 0.45*Math.sin(t*st.tw + st.x*0.001);
    rctx.beginPath();
    rctx.arc(st.x + dx, st.y + dy, st.r, 0, Math.PI*2);
    rctx.fillStyle = `rgba(255,255,255,${st.a*tw})`;
    rctx.fill();
  }
}

function drawRocket(x, y, s, flame=1) {
  rctx.save();
  rctx.translate(x, y);
  rctx.scale(s, s);

  // engine plume (animated)
  const f = flame;
  rctx.beginPath();
  rctx.moveTo(0, 86);
  rctx.quadraticCurveTo(-16, 120 + 18*f, 0, 155 + 22*f);
  rctx.quadraticCurveTo(16, 120 + 18*f, 0, 86);
  rctx.fillStyle = `rgba(255,160,40,${0.72})`;
  rctx.fill();

  rctx.beginPath();
  rctx.moveTo(0, 98);
  rctx.quadraticCurveTo(-9, 122 + 12*f, 0, 142 + 16*f);
  rctx.quadraticCurveTo(9, 122 + 12*f, 0, 98);
  rctx.fillStyle = `rgba(255,245,210,${0.78})`;
  rctx.fill();

  // body
  rctx.beginPath();
  rctx.roundRect(-18, -30, 36, 116, 16);
  rctx.fillStyle = "rgba(240,242,246,0.98)";
  rctx.fill();

  // subtle shading
  const lg = rctx.createLinearGradient(-18,0,18,0);
  lg.addColorStop(0,"rgba(0,0,0,0.10)");
  lg.addColorStop(0.4,"rgba(255,255,255,0.02)");
  lg.addColorStop(1,"rgba(0,0,0,0.18)");
  rctx.fillStyle = lg;
  rctx.fillRect(-18,-30,36,116);

  // window
  rctx.beginPath();
  rctx.arc(0, 12, 10, 0, Math.PI*2);
  rctx.fillStyle = "rgba(30,120,220,0.92)";
  rctx.fill();
  rctx.lineWidth = 2;
  rctx.strokeStyle = "rgba(0,0,0,0.15)";
  rctx.stroke();

  // nose
  rctx.beginPath();
  rctx.moveTo(-18, -30);
  rctx.quadraticCurveTo(0, -74, 18, -30);
  rctx.closePath();
  rctx.fillStyle = "rgba(220,40,60,0.96)";
  rctx.fill();

  // fins
  rctx.beginPath();
  rctx.moveTo(-18, 62);
  rctx.lineTo(-42, 86);
  rctx.lineTo(-18, 86);
  rctx.closePath();
  rctx.fillStyle = "rgba(220,40,60,0.96)";
  rctx.fill();

  rctx.beginPath();
  rctx.moveTo(18, 62);
  rctx.lineTo(42, 86);
  rctx.lineTo(18, 86);
  rctx.closePath();
  rctx.fillStyle = "rgba(220,40,60,0.96)";
  rctx.fill();

  rctx.restore();
}

function updateParticles() {
  // smoke
  for (let i=smoke.length-1; i>=0; i--) {
    const p = smoke[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06 * devicePixelRatio;
    p.r *= 0.986;
    p.a *= 0.987;
    p.life -= 1;
    if (p.life <= 0 || p.a < 0.02 || p.r < 1) smoke.splice(i,1);
  }
  // sparks
  for (let i=sparks.length-1; i>=0; i--) {
    const s = sparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.18 * devicePixelRatio;
    s.a *= 0.95;
    s.life -= 1;
    if (s.life <= 0 || s.a < 0.03) sparks.splice(i,1);
  }
}

function drawParticles() {
  // smoke
  for (const p of smoke) {
    rctx.beginPath();
    rctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    rctx.fillStyle = `rgba(220,230,240,${p.a})`;
    rctx.fill();
  }
  // sparks
  for (const s of sparks) {
    rctx.beginPath();
    rctx.arc(s.x, s.y, 2.0*devicePixelRatio, 0, Math.PI*2);
    rctx.fillStyle = `rgba(255,200,120,${s.a})`;
    rctx.fill();
  }
}

function rocketLoop(ts) {
  if (!rocketRunning) return;
  if (!filmStart) filmStart = ts;
  const t = (ts - filmStart) / 1000; // seconds

  const w = rocketCanvas.width;
  const h = rocketCanvas.height;

  // stop after 60 seconds (as requested)
  if (t >= 60) {
    stopRocketShow();
    return;
  }

  // cinematic camera drift
  const camDriftX = Math.sin(t*0.12) * 18 * devicePixelRatio;
  const camDriftY = Math.cos(t*0.10) * 12 * devicePixelRatio;

  // background clear
  rctx.clearRect(0,0,w,h);

  // star parallax (far moves least, near most)
  const farDx  = -t * 6  * devicePixelRatio + camDriftX*0.15;
  const farDy  =  t * 2  * devicePixelRatio + camDriftY*0.15;
  const midDx  = -t * 14 * devicePixelRatio + camDriftX*0.30;
  const midDy  =  t * 5  * devicePixelRatio + camDriftY*0.30;
  const nearDx = -t * 28 * devicePixelRatio + camDriftX*0.55;
  const nearDy =  t * 10 * devicePixelRatio + camDriftY*0.55;

  drawNebula(t,w,h);
  drawPlanet(t,w,h);

  drawStars(starsFar,  t, farDx,  farDy);
  drawStars(starsMid,  t, midDx,  midDy);
  drawStars(starsNear, t, nearDx, nearDy);

  // phases
  // 0..8s launch, 8..18s upper-atmosphere, 18..60s cruise
  let rocketX = w*0.5 + Math.sin(t*0.7) * 20 * devicePixelRatio + camDriftX;
  let rocketY;

  if (t < 8) {
    // launch: accelerate upward from near bottom
    const k = t/8;
    rocketY = h*0.78 - (k*k) * (h*0.55) + camDriftY;
    spawnSmoke(rocketX, rocketY + 150*devicePixelRatio, 1.2);
    if (t < 2.5) spawnSparks(rocketX, rocketY + 140*devicePixelRatio, 6);
  } else if (t < 18) {
    // climb to space
    const k = (t-8)/10;
    rocketY = h*0.23 - (k) * (h*0.12) + camDriftY;
    spawnSmoke(rocketX, rocketY + 140*devicePixelRatio, 0.65);
  } else {
    // cruise: keep rocket near center-left, stars move faster
    const k = (t-18)/42;
    rocketX = w*0.46 + Math.sin(t*0.9) * 28 * devicePixelRatio + camDriftX;
    rocketY = h*0.42 + Math.cos(t*0.7) * 22 * devicePixelRatio + camDriftY;

    // engine trail in space (less smoke, more glow)
    spawnSmoke(rocketX - 10*devicePixelRatio, rocketY + 150*devicePixelRatio, 0.35);
  }

  // update & draw particles
  updateParticles();
  drawParticles();

  // engine flame intensity
  const flame = (t < 8) ? (1.1 + 0.35*Math.sin(t*12)) : (0.55 + 0.18*Math.sin(t*10));

  // subtle vignette
  const vg = rctx.createRadialGradient(w*0.5, h*0.5, Math.min(w,h)*0.15, w*0.5, h*0.5, Math.max(w,h)*0.65);
  vg.addColorStop(0, "rgba(0,0,0,0)");
  vg.addColorStop(1, "rgba(0,0,0,0.35)");
  rctx.fillStyle = vg;
  rctx.fillRect(0,0,w,h);

  // rocket draw
  drawRocket(rocketX, rocketY, 1.55*devicePixelRatio, flame);

  // faint HUD line (cinematic)
  rctx.globalAlpha = 0.25;
  rctx.lineWidth = 2*devicePixelRatio;
  rctx.strokeStyle = "rgba(255,255,255,0.18)";
  rctx.beginPath();
  rctx.moveTo(w*0.08, h*0.52);
  rctx.lineTo(w*0.92, h*0.52);
  rctx.stroke();
  rctx.globalAlpha = 1;

  rocketRAF = requestAnimationFrame(rocketLoop);
}

function startRocketShow() {
  // hide everything (timer fully off)
  canvas.classList.add("hidden");
  document.getElementById("controls").classList.add("hidden");
  document.getElementById("topTime").classList.add("hidden");

  rocketOverlay.style.display = "block";
  cinematicHud.style.display = "none"; // countdown hud controlled separately

  resizeRocketCanvas();
  initStarfields();
  smoke = [];
  sparks = [];
  filmStart = 0;
  rocketRunning = true;

  // sound: launch
  rumble(1600);
  whoosh(1000);
  startEngineHum();

  rocketRAF = requestAnimationFrame(rocketLoop);
}

function stopRocketShow() {
  rocketRunning = false;
  if (rocketRAF) cancelAnimationFrame(rocketRAF);
  rocketRAF = null;

  rocketOverlay.style.display = "none";
  cinematicHud.style.display = "none";

  stopEngineHum();

  // show timer UI again (timer stays at 0)
  canvas.classList.remove("hidden");
  document.getElementById("controls").classList.remove("hidden");
  document.getElementById("topTime").classList.remove("hidden");
}

/* =========================
   Tick / Countdown / Start (SYNC FIX)
========================= */
function showCountdownHud(n) {
  cinematicHud.style.display = "flex";
  countText.textContent = String(n);
}

function hideCountdownHud() {
  cinematicHud.style.display = "none";
}

// IMPORTANT SYNC FIX:
// We decrement first -> draw uses updated remaining -> we speak the same number.
function tick() {
  applyDailyAutomation(new Date());

  if (running && remaining > 0) {
    remaining--; // <-- decrement first (SYNC)

    // countdown last 10 seconds (10..1)
    if (remaining <= 10 && remaining >= 1) {
      showCountdownHud(remaining);

      if (lastSpoken !== remaining) {
        lastSpoken = remaining;
        beep(remaining <= 3 ? 980 : 880, 120, 0.06);
        speakNumber(remaining);
      }
    } else {
      hideCountdownHud();
      lastSpoken = null;
    }

    if (remaining === 0) {
      running = false;
      hideCountdownHud();
      lastSpoken = null;

      beep(1200, 180, 0.08);
      speakNumber(0);

      // start 60s cinematic rocket film
      startRocketShow();
    }
  }
}

/* =========================
   Controls
========================= */
const minutesInput = document.getElementById("minutesInput");
const secondsInput = document.getElementById("secondsInput");

function clampInt(v, min, max, fallback) {
  const n = Number(v);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, Math.floor(n)));
}

function setTimer() {
  const mins = clampInt(minutesInput.value, 0, 60, 45);
  const secs = clampInt(secondsInput.value, 0, 59, 0);
  minutesInput.value = String(mins);
  secondsInput.value = String(secs);

  stopRocketShow();
  remaining = mins*60 + secs;
  if (remaining <= 0) remaining = 1;
  lastSpoken = null;
  hideCountdownHud();
}

function toggleTimer() {
  ensureAudio();
  running = !running;
}

document.getElementById("btnSet").addEventListener("click", () => {
  ensureAudio();
  setTimer();
});
document.getElementById("btnToggle").addEventListener("click", toggleTimer);

// Preset: 15 Sekunden
document.getElementById("btn15").addEventListener("click", () => {
  ensureAudio();
  minutesInput.value = "0";
  secondsInput.value = "15";
  setTimer();
});

/* =========================
   Top time
========================= */
const topTimeEl = document.getElementById("topTime");
function updateTopTime() {
  const now = new Date();
  topTimeEl.textContent =
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0");
}

setInterval(tick, 1000);
setInterval(updateTopTime, 1000);

updateTopTime();
applyDailyAutomation(new Date());
draw();
</script>
