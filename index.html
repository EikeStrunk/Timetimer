<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wand-Timer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #f3f5f8 0%, #dde3ea 55%, #cfd6df 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #topTime {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 44px;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 16px;
    border-radius: 14px;
  }

  canvas#timer {
    width: 85vmin;
    height: 85vmin;
    filter: drop-shadow(0 10px 35px rgba(0,0,0,0.18));
  }

  #controls {
    position: absolute;
    bottom: 18px;
    right: 18px;
    display: flex;
    gap: 10px;
    align-items: center;

    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(0,0,0,0.08);
    padding: 10px 12px;
    border-radius: 14px;

    opacity: 0.45;
    transition: opacity 0.2s, transform 0.2s;
    user-select: none;
    touch-action: manipulation;
  }

  #controls:hover { opacity: 0.95; transform: translateY(-2px); }

  #controls input, #controls button {
    font-size: 16px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.12);
    background: rgba(255,255,255,0.75);
    color: rgba(0,0,0,0.85);
    outline: none;
    cursor: pointer;
  }

  #controls .label {
    font-size: 14px;
    color: rgba(0,0,0,0.65);
  }

  /* Rocket overlay */
  #rocketOverlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 70%, #0b1020 0%, #060812 60%, #000 100%);
    display: none;
    z-index: 9999;
  }

  #rocketCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  #rocketCaption {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10000;
    color: rgba(255,255,255,0.92);
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 10px 16px;
    border-radius: 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    display: none;
  }

  .hidden { display: none !important; }
</style>
</head>

<body>

<div id="topTime"></div>
<canvas id="timer"></canvas>

<div id="controls">
  <span class="label">Min:</span>
  <input type="number" id="minutesInput" value="45" min="0" max="60">
  <span class="label">Sek:</span>
  <input type="number" id="secondsInput" value="0" min="0" max="59">
  <button id="btn15">15s</button>
  <button id="btnSet">Setzen</button>
  <button id="btnToggle">Start / Pause</button>
</div>

<div id="rocketOverlay">
  <canvas id="rocketCanvas"></canvas>
</div>
<div id="rocketCaption">🚀 LIFTOFF</div>

<script>
/* =========================
   Timer (Uhr)
========================= */
const canvas = document.getElementById("timer");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 800;

let totalTime = 60 * 60;     // 60min Skala
let remaining = 45 * 60;
let running = false;

// Countdown state
let countdownActive = false;
let lastSpoken = null;

// Version A Zeitautomatik
const AUTO_START_H = 7, AUTO_START_M = 15;
const AUTO_ZERO_H  = 8, AUTO_ZERO_M  = 0;
const MORNING_MINUTES = 45;
let lastAutoStartKey = null;
let lastAutoZeroKey = null;

function todayKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function applyDailyAutomation(now = new Date()) {
  const key = todayKey(now);
  const h = now.getHours();
  const m = now.getMinutes();

  // 07:15 -> 45min + Start
  if (h === AUTO_START_H && m === AUTO_START_M && lastAutoStartKey !== key) {
    stopRocketShow(); // falls Rocket noch offen ist
    remaining = MORNING_MINUTES * 60;
    minutesInput.value = String(MORNING_MINUTES);
    secondsInput.value = "0";
    running = true;
    lastAutoStartKey = key;
  }

  // 08:00 -> 0 + Stop
  if (h === AUTO_ZERO_H && m === AUTO_ZERO_M && lastAutoZeroKey !== key) {
    stopRocketShow();
    remaining = 0;
    running = false;
    lastAutoZeroKey = key;
  }
}

function getColor(secondsLeft) {
  if (secondsLeft > 45 * 60) return "#1a73e8";  // blau
  if (secondsLeft > 30 * 60) return "#3cb371";  // grün
  if (secondsLeft > 15 * 60) return "#e6b800";  // gelb
  return "#d64545";                             // rot
}

function drawClockFace() {
  ctx.beginPath();
  ctx.arc(400, 400, 360, 0, 2*Math.PI);
  ctx.fillStyle = "#f7f8fa";
  ctx.fill();
  ctx.lineWidth = 8;
  ctx.strokeStyle = "rgba(0,0,0,0.18)";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(400, 400, 340, 0, 2*Math.PI);
  ctx.fillStyle = "#ffffff";
  ctx.fill();

  drawMinuteLabel(45);
  drawMinuteLabel(30);
  drawMinuteLabel(15);
}

function drawMinuteLabel(minute) {
  const angle = (minute / 60) * 2*Math.PI - Math.PI/2;
  const radius = 305;
  const x = 400 + radius * Math.cos(angle);
  const y = 400 + radius * Math.sin(angle);

  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(minute, x, y);
}

function drawTimerArc() {
  const progress = remaining / totalTime;
  const angle = progress * 2*Math.PI;

  ctx.beginPath();
  ctx.moveTo(400, 400);
  ctx.arc(400, 400, 335, -Math.PI/2, angle - Math.PI/2, false);
  ctx.fillStyle = getColor(remaining);
  ctx.globalAlpha = 0.92;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function formatMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

function drawRemaining() {
  ctx.fillStyle = "rgba(0,0,0,0.78)";
  ctx.font = "bold 86px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(formatMMSS(remaining), 400, 410);
}

function draw() {
  if (!canvas.classList.contains("hidden")) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawClockFace();
    drawTimerArc();
    drawRemaining();
  }
  requestAnimationFrame(draw);
}

/* =========================
   Sound + Speech
========================= */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === "suspended" && audioCtx.resume) {
    audioCtx.resume();
  }
}

function beep(freq=880, ms=110, gain=0.06) {
  ensureAudio();
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.frequency.value = freq;
  g.gain.value = gain;

  osc.connect(g);
  g.connect(audioCtx.destination);

  osc.start(t0);
  osc.stop(t0 + ms/1000);

  // kleines Fade-out
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms/1000);
}

function rumble(ms=1200) {
  ensureAudio();
  if (!audioCtx) return;

  const t0 = audioCtx.currentTime;
  const duration = ms/1000;

  // Noise
  const bufferSize = Math.floor(audioCtx.sampleRate * duration);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i=0; i<bufferSize; i++) {
    data[i] = (Math.random()*2 - 1) * 0.8;
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  // Filter + Gain
  const filter = audioCtx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 180;

  const g = audioCtx.createGain();
  g.gain.value = 0.001;

  noise.connect(filter);
  filter.connect(g);
  g.connect(audioCtx.destination);

  // fade in/out
  g.gain.setValueAtTime(0.001, t0);
  g.gain.linearRampToValueAtTime(0.10, t0 + 0.12);
  g.gain.linearRampToValueAtTime(0.04, t0 + duration);
  noise.start(t0);
  noise.stop(t0 + duration);
}

function whoosh(ms=900) {
  ensureAudio();
  if (!audioCtx) return;

  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(240, t0);
  osc.frequency.exponentialRampToValueAtTime(60, t0 + ms/1000);

  g.gain.setValueAtTime(0.001, t0);
  g.gain.linearRampToValueAtTime(0.07, t0 + 0.08);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms/1000);

  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + ms/1000);
}

function speakNumber(n) {
  if (!("speechSynthesis" in window)) return;
  // iOS/Browser: manchmal darf Speech nur nach User-Interaction
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(n));
    u.lang = "de-DE";
    u.rate = 1.0;
    u.pitch = 1.0;
    u.volume = 1.0;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

/* =========================
   Rocket Animation Overlay
========================= */
const rocketOverlay = document.getElementById("rocketOverlay");
const rocketCanvas = document.getElementById("rocketCanvas");
const rctx = rocketCanvas.getContext("2d");
const rocketCaption = document.getElementById("rocketCaption");

let rocketRAF = null;
let rocketT0 = 0;
let particles = [];
let stars = [];
let rocketRunning = false;

function resizeRocketCanvas() {
  rocketCanvas.width = Math.floor(window.innerWidth * devicePixelRatio);
  rocketCanvas.height = Math.floor(window.innerHeight * devicePixelRatio);
  rctx.setTransform(1,0,0,1,0,0);
}
window.addEventListener("resize", resizeRocketCanvas);

function initStars() {
  stars = [];
  const w = rocketCanvas.width, h = rocketCanvas.height;
  const count = Math.floor((w*h) / (40000 * devicePixelRatio));
  for (let i=0; i<count; i++) {
    stars.push({
      x: Math.random()*w,
      y: Math.random()*h,
      r: (Math.random()*1.6 + 0.4)*devicePixelRatio,
      a: Math.random()*0.6 + 0.2,
      tw: Math.random()*0.8 + 0.2
    });
  }
}

function spawnSmoke(x,y) {
  for (let i=0; i<14; i++) {
    particles.push({
      x, y,
      vx: (Math.random()*2-1) * 2.2 * devicePixelRatio,
      vy: (Math.random()*1.2 + 2.2) * devicePixelRatio,
      r: (Math.random()*14 + 10) * devicePixelRatio,
      a: 0.55,
      life: Math.random()*50 + 40
    });
  }
}

function drawRocket(x, y, s) {
  // simple rocket (body + nose + fins)
  rctx.save();
  rctx.translate(x, y);
  rctx.scale(s, s);

  // flame
  rctx.beginPath();
  rctx.moveTo(0, 80);
  rctx.quadraticCurveTo(-14, 120, 0, 140);
  rctx.quadraticCurveTo(14, 120, 0, 80);
  rctx.fillStyle = "rgba(255,160,40,0.95)";
  rctx.fill();

  rctx.beginPath();
  rctx.moveTo(0, 92);
  rctx.quadraticCurveTo(-8, 120, 0, 132);
  rctx.quadraticCurveTo(8, 120, 0, 92);
  rctx.fillStyle = "rgba(255,240,180,0.95)";
  rctx.fill();

  // body
  rctx.beginPath();
  rctx.roundRect(-18, -30, 36, 110, 16);
  rctx.fillStyle = "rgba(240,242,246,0.98)";
  rctx.fill();

  // window
  rctx.beginPath();
  rctx.arc(0, 10, 10, 0, Math.PI*2);
  rctx.fillStyle = "rgba(30,120,220,0.9)";
  rctx.fill();
  rctx.lineWidth = 2;
  rctx.strokeStyle = "rgba(0,0,0,0.15)";
  rctx.stroke();

  // nose
  rctx.beginPath();
  rctx.moveTo(-18, -30);
  rctx.quadraticCurveTo(0, -70, 18, -30);
  rctx.closePath();
  rctx.fillStyle = "rgba(220,40,60,0.95)";
  rctx.fill();

  // fins
  rctx.beginPath();
  rctx.moveTo(-18, 58);
  rctx.lineTo(-40, 78);
  rctx.lineTo(-18, 78);
  rctx.closePath();
  rctx.fillStyle = "rgba(220,40,60,0.95)";
  rctx.fill();

  rctx.beginPath();
  rctx.moveTo(18, 58);
  rctx.lineTo(40, 78);
  rctx.lineTo(18, 78);
  rctx.closePath();
  rctx.fillStyle = "rgba(220,40,60,0.95)";
  rctx.fill();

  rctx.restore();
}

function rocketLoop(ts) {
  if (!rocketRunning) return;
  if (!rocketT0) rocketT0 = ts;
  const t = (ts - rocketT0) / 1000;

  const w = rocketCanvas.width;
  const h = rocketCanvas.height;

  // background
  rctx.clearRect(0,0,w,h);

  // stars
  for (const st of stars) {
    const tw = 0.5 + 0.5*Math.sin(t*st.tw + st.x*0.001);
    rctx.beginPath();
    rctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
    rctx.fillStyle = `rgba(255,255,255,${st.a*tw})`;
    rctx.fill();
  }

  // rocket motion: start near bottom, go up
  const baseX = w * 0.5;
  const startY = h * 0.78;
  const y = startY - (t*t) * (220 * devicePixelRatio); // accelerate upward
  const x = baseX + Math.sin(t*1.2) * (14 * devicePixelRatio);

  // smoke spawn
  spawnSmoke(x, y + 120*devicePixelRatio);

  // particles
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06 * devicePixelRatio;
    p.r *= 0.985;
    p.a *= 0.985;
    p.life -= 1;
    if (p.life <= 0 || p.a < 0.02 || p.r < 1) {
      particles.splice(i,1);
      continue;
    }
    rctx.beginPath();
    rctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    rctx.fillStyle = `rgba(220,230,240,${p.a})`;
    rctx.fill();
  }

  // ground glow
  rctx.beginPath();
  rctx.ellipse(w*0.5, h*0.88, 260*devicePixelRatio, 80*devicePixelRatio, 0, 0, Math.PI*2);
  rctx.fillStyle = "rgba(255,170,70,0.08)";
  rctx.fill();

  // rocket
  drawRocket(x, y, 1.6*devicePixelRatio);

  // finish after ~6s
  if (y < -200*devicePixelRatio || t > 6.5) {
    stopRocketShow();
    return;
  }

  rocketRAF = requestAnimationFrame(rocketLoop);
}

function startRocketShow() {
  // hide timer UI
  canvas.classList.add("hidden");
  document.getElementById("controls").classList.add("hidden");
  document.getElementById("topTime").classList.add("hidden");

  // show overlay
  rocketOverlay.style.display = "block";
  rocketCaption.style.display = "block";

  resizeRocketCanvas();
  initStars();
  particles = [];
  rocketT0 = 0;
  rocketRunning = true;

  // sound sequence
  rumble(1400);
  whoosh(900);

  rocketRAF = requestAnimationFrame(rocketLoop);
}

function stopRocketShow() {
  rocketRunning = false;
  if (rocketRAF) cancelAnimationFrame(rocketRAF);
  rocketRAF = null;

  rocketOverlay.style.display = "none";
  rocketCaption.style.display = "none";

  // show timer UI again (timer stays at 0)
  canvas.classList.remove("hidden");
  document.getElementById("controls").classList.remove("hidden");
  document.getElementById("topTime").classList.remove("hidden");
}

/* =========================
   Tick / Countdown / Start
========================= */
function tick() {
  applyDailyAutomation(new Date());

  if (running && remaining > 0) {
    // Countdown letzte 10 Sekunden
    if (remaining <= 10) {
      countdownActive = true;

      // genau einmal pro Sekunde sprechen/beepen
      if (lastSpoken !== remaining) {
        lastSpoken = remaining;
        beep(remaining <= 3 ? 980 : 880, 120, 0.06);
        speakNumber(remaining);
      }
    } else {
      countdownActive = false;
      lastSpoken = null;
    }

    remaining--;

    // bei 0: Rakete starten
    if (remaining === 0) {
      running = false;
      countdownActive = false;
      lastSpoken = null;

      // final beep + "0"
      beep(1200, 180, 0.08);
      speakNumber(0);

      startRocketShow();
    }
  }
}

/* =========================
   Controls
========================= */
const minutesInput = document.getElementById("minutesInput");
const secondsInput = document.getElementById("secondsInput");

function clampInt(v, min, max, fallback) {
  const n = Number(v);
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, Math.floor(n)));
}

function setTimer() {
  const mins = clampInt(minutesInput.value, 0, 60, 45);
  const secs = clampInt(secondsInput.value, 0, 59, 0);
  minutesInput.value = String(mins);
  secondsInput.value = String(secs);

  stopRocketShow(); // falls Animation noch läuft
  remaining = mins*60 + secs;
  if (remaining <= 0) remaining = 1;
  lastSpoken = null;
}

function toggleTimer() {
  // erste Nutzeraktion => Audio aktivieren
  ensureAudio();
  running = !running;
}

document.getElementById("btnSet").addEventListener("click", () => {
  ensureAudio();
  setTimer();
});

document.getElementById("btnToggle").addEventListener("click", toggleTimer);

// Preset: 15 Sekunden
document.getElementById("btn15").addEventListener("click", () => {
  ensureAudio();
  minutesInput.value = "0";
  secondsInput.value = "15";
  setTimer();
});

/* =========================
   Top time
========================= */
const topTimeEl = document.getElementById("topTime");
function updateTopTime() {
  const now = new Date();
  topTimeEl.textContent =
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0");
}

setInterval(tick, 1000);
setInterval(updateTopTime, 1000);

updateTopTime();
applyDailyAutomation(new Date());
draw();
</script>

</body>
</html>
